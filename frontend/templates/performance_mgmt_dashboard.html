{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Filter Pane -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">All Months</option>
                    </select>
                </div>
                <hr>
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="resetFilters" class="btn btn-block btn-reset-filters mb-2">
                    <i class="fas fa-undo mr-1"></i> Reset All
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="col-md-10">
        <div class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner"><h3 id="kpiInstructors">0</h3><p>Total Instructors</p></div>
                    <div class="icon"><i class="fas fa-users"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner"><h3 id="kpiAvgSessions">0</h3><p>Avg Sessions/Instructor</p></div>
                    <div class="icon"><i class="fas fa-chart-line"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner"><h3 id="kpiSessions">0</h3><p>Total Sessions</p></div>
                    <div class="icon"><i class="fas fa-chalkboard-teacher"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner"><h3 id="kpiStudents">0</h3><p>Total Students Impacted</p></div>
                    <div class="icon"><i class="fas fa-user-graduate"></i></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="performanceTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Instructor</th>
                                <th>Role</th>
                                <th>Region</th>
                                <th class="text-center">Programs</th>
                                <th class="text-center">Sessions</th>
                                <th class="text-center">Schools</th>
                                <th class="text-center">Students</th>
                                <th class="text-center">Avg Duration (min)</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;
    if ($.fn.select2) $('.select2').select2({ theme: 'bootstrap4' });

    fetch('/performance-management-dashboard/filters')
        .then(r => r.json())
        .then(data => {
            data.regions.forEach(r => $('#regionFilter').append(new Option(r, r)));
            data.years.forEach(y => $('#yearFilter').append(new Option(y, y)));
            data.months.forEach(m => $('#monthFilter').append(new Option(m.name, m.id)));
        });

    function loadData() {
        window.PramanaDashboard.initDataTable('#performanceTable', {
            ajaxUrl: '/performance-mgmt/data',
            getFilters: function() {
                return {
                    region: $('#regionFilter').val(),
                    year:   $('#yearFilter').val(),
                    month:  $('#monthFilter').val()
                };
            },
            onDataLoad: function(data) {
                if (data.kpis && data.kpis.length >= 4) {
                    $('#kpiInstructors').text(data.kpis[0].value.toLocaleString());
                    $('#kpiAvgSessions').text(data.kpis[1].value.toLocaleString());
                    $('#kpiSessions').text(data.kpis[2].value.toLocaleString());
                    $('#kpiStudents').text(data.kpis[3].value.toLocaleString());
                }
                // Store top sessions for progress bar calculation if needed
                window._topSessions = (data.table && data.table.length > 0) ? data.table[0].sessions : 1;
            },
            columns: [
                { data: 'instructor_name', className: 'font-weight-bold' },
                { data: 'role', render: function(data) {
                    return `<span class="badge badge-secondary">${data}</span>`;
                }},
                { data: 'region_name' },
                { data: 'programs', className: 'text-center', render: function(data) {
                    return (data||0).toLocaleString();
                }},
                { data: 'sessions', className: 'text-center', render: function(data) {
                    const top = window._topSessions || 1;
                    const pct = Math.round((data / top) * 100);
                    return `
                        ${(data||0).toLocaleString()}
                        <div class="progress progress-xxs mt-1"><div class="progress-bar bg-info" style="width:${pct}%"></div></div>
                    `;
                }},
                { data: 'schools', className: 'text-center', render: function(data) {
                    return (data||0).toLocaleString();
                }},
                { data: 'students_impacted', className: 'text-center', render: function(data) {
                    return (data||0).toLocaleString();
                }},
                { data: 'avg_duration_min', className: 'text-center', render: function(data) {
                    return (data||0).toLocaleString();
                }}
            ]
        });
    }

    $('#seeReport').click(() => { loadData(); });

    $('#resetFilters').click(function() {
        window.PramanaDashboard.resetTable('#performanceTable', loadData);
    });
    $('#exportXlsx').click(() => {
        const q = new URLSearchParams({ region: $('#regionFilter').val(), year: $('#yearFilter').val(), month: $('#monthFilter').val() }).toString();
        window.exportToXLSX(`/performance-management-dashboard/export?${q}`, 'performance_mgmt.xlsx');
    });

    setTimeout(loadData, 300);
});
</script>
{% endblock %}
