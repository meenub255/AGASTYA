{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Filter Pane -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Area</label>
                    <select id="areaFilter" class="form-control select2" disabled>
                        <option value="">All Areas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">All Months</option>
                    </select>
                </div>
                <hr>
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="resetFilters" class="btn btn-block btn-reset-filters mb-2">
                    <i class="fas fa-undo mr-1"></i> Reset All
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="col-md-10">
        <div class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner"><h3 id="kpiSessions">0</h3><p>Total Sessions</p></div>
                    <div class="icon"><i class="fas fa-chalkboard-teacher"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner"><h3 id="kpiSchools">0</h3><p>Total Schools</p></div>
                    <div class="icon"><i class="fas fa-school"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner"><h3 id="kpiExposure">0</h3><p>Total Exposure</p></div>
                    <div class="icon"><i class="fas fa-user-graduate"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner"><h3 id="kpiAvgDuration">0</h3><p>Avg Session (min)</p></div>
                    <div class="icon"><i class="fas fa-clock"></i></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="regionwiseTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Region</th>
                                <th>Area</th>
                                <th>Program</th>
                                <th>Sessions</th>
                                <th>Schools</th>
                                <th>Exposure</th>
                                <th>Demo Sessions</th>
                                <th>Hands-on Sessions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;
    if ($.fn.select2) $('.select2').select2({ theme: 'bootstrap4' });

    function loadFilters(region = null) {
        const url = region ? `/regionwise-dashboard/filters?region=${encodeURIComponent(region)}` : '/regionwise-dashboard/filters';
        fetch(url).then(r => r.json()).then(data => {
            if (!region) {
                data.regions.forEach(r => $('#regionFilter').append(new Option(r, r)));
                data.years.forEach(y => $('#yearFilter').append(new Option(y, y)));
                data.months.forEach(m => $('#monthFilter').append(new Option(m.name, m.id)));
            }
            const af = $('#areaFilter');
            af.empty().append(new Option('All Areas', ''));
            if (data.areas && data.areas.length > 0) {
                data.areas.forEach(a => af.append(new Option(a, a)));
                af.prop('disabled', false);
            } else {
                af.prop('disabled', true);
            }
        });
    }

    loadFilters();
    $('#regionFilter').on('change', function() { loadFilters($(this).val()); });

    function loadData() {
        window.PramanaDashboard.initDataTable('#regionwiseTable', {
            ajaxUrl: '/regionwise-dashboard/data',
            getFilters: function() {
                return {
                    region: $('#regionFilter').val(),
                    area:   $('#areaFilter').val(),
                    year:   $('#yearFilter').val(),
                    month:  $('#monthFilter').val()
                };
            },
            onDataLoad: function(data) {
                if (data.kpis && data.kpis.length >= 4) {
                    $('#kpiSessions').text(data.kpis[0].value.toLocaleString());
                    $('#kpiSchools').text(data.kpis[1].value.toLocaleString());
                    $('#kpiExposure').text(data.kpis[2].value.toLocaleString());
                    $('#kpiAvgDuration').text(data.kpis[3].value.toLocaleString());
                }
            },
            columns: [
                { data: 'region_name', className: 'font-weight-bold', width: '12%' },
                { data: 'area_name' },
                { data: 'program_name', width: '15%' },
                { data: 'sessions', className: 'text-center' },
                { data: 'schools', className: 'text-center' },
                { data: 'exposure', className: 'text-center font-weight-bold' },
                { data: 'demo_sessions', className: 'text-center' },
                { data: 'hands_on_sessions', className: 'text-center' }
            ]
        });
    }

    $('#seeReport').click(() => { loadData(); });

    $('#resetFilters').click(function() {
        window.PramanaDashboard.resetTable('#regionwiseTable', loadData);
    });
    $('#exportXlsx').click(() => {
        const q = new URLSearchParams({ region: $('#regionFilter').val(), area: $('#areaFilter').val(), year: $('#yearFilter').val(), month: $('#monthFilter').val() }).toString();
        window.exportToXLSX(`/regionwise-dashboard/export?${q}`, 'regionwise_dashboard.xlsx');
    });

    setTimeout(loadData, 300);
});
</script>
{% endblock %}
