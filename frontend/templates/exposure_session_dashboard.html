{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Filter Pane -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Program</label>
                    <select id="programFilter" class="form-control select2">
                        <option value="">All Programs</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">All Months</option>
                    </select>
                </div>
                <div class="form-group mb-2">
                    <div class="custom-control custom-switch">
                        <input type="checkbox" class="custom-control-input" id="toggleDataLabels" checked>
                        <label class="custom-control-label text-sm" for="toggleDataLabels">Show Data Labels</label>
                    </div>
                </div>
                <hr class="my-2">
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="resetFilters" class="btn btn-block btn-reset-filters mb-2">
                    <i class="fas fa-undo mr-1"></i> Reset All
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="col-md-10">
        <div class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner"><h3 id="kpiStudents">0</h3><p>Total Students Exposed</p></div>
                    <div class="icon"><i class="fas fa-user-graduate"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner"><h3 id="kpiBoys">0</h3><p>Total Boys</p></div>
                    <div class="icon"><i class="fas fa-male"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner"><h3 id="kpiGirls">0</h3><p>Total Girls</p></div>
                    <div class="icon"><i class="fas fa-female"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner"><h3 id="kpiSessions">0</h3><p>Total Sessions</p></div>
                    <div class="icon"><i class="fas fa-chalkboard"></i></div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="card h-100 white-chart-card">
                    <div class="card-header border-0 pb-0 d-flex justify-content-between align-items-center">
                        <h3 class="card-title text-sm uppercase">Gender Distribution</h3>
                        <i class="fas fa-info-circle text-muted ml-auto gender-legend-trigger" 
                           style="cursor: pointer;"
                           data-toggle="popover" 
                           data-trigger="click" 
                           data-html="true"
                           tabindex="0"
                           title="Gender Legend" 
                           data-content="<div style='font-size:11px'><b>Boys</b>: Male students<br><b>Girls</b>: Female students</div>"></i>
                    </div>
                    <div class="card-body">
                        <div style="height:450px"><canvas id="genderDoughnut"></canvas></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100 white-chart-card">
                    <div class="card-header border-0 pb-0">
                        <h3 class="card-title text-sm uppercase">Exposure Trend by Month</h3>
                    </div>
                    <div class="card-body">
                        <div style="height:450px"><canvas id="exposureTrendLine"></canvas></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="exposureTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Region</th>
                                <th>Area</th>
                                <th>Program</th>
                                <th>Session Date</th>
                                <th>School</th>
                                <th>Class</th>
                                <th class="text-center">Boys</th>
                                <th class="text-center">Girls</th>
                                <th class="text-center">Total</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
if (window.ChartDataLabels) { Chart.register(ChartDataLabels); }
$(function () {
    const pagination = window.PramanaPagination;
    if ($.fn.select2) $('.select2').select2({ theme: 'bootstrap4' });

    $('.gender-legend-trigger').popover({
        html: true,
        sanitize: false,
        trigger: 'click',
        placement: 'bottom'
    });

    function computeTrendLine(values) {
        const n = values.length;
        if (n < 2) return values.slice();
        let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
        for (let i = 0; i < n; i++) {
            sumX += i; sumY += values[i];
            sumXY += i * values[i]; sumXX += i * i;
        }
        const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
        const intercept = (sumY - slope * sumX) / n;
        return values.map((_, i) => Math.round(intercept + slope * i));
    }

    fetch('/exposure-session-dashboard/filters')
        .then(r => r.json())
        .then(data => {
            data.regions.forEach(r => $('#regionFilter').append(new Option(r, r)));
            data.programs.forEach(p => $('#programFilter').append(new Option(p, p)));
            data.years.forEach(y => $('#yearFilter').append(new Option(y, y)));
            data.months.forEach(m => $('#monthFilter').append(new Option(m.name, m.id)));
        });

    function renderDoughnutChart(canvasId, chartData, chartRef) {
        const el = document.getElementById(canvasId);
        if (!el) return;
        const ctx = el.getContext('2d');
        if (window[chartRef]) window[chartRef].destroy();

        window[chartRef] = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: chartData.map(d => d.label),
                datasets: [{
                    data: chartData.map(d => d.value),
                    backgroundColor: ['#3b82f6', '#ec4899'],
                    borderWidth: 3,
                    borderColor: '#ffffff',
                    hoverOffset: 8
                }]
            },
            plugins: [ChartDataLabels, window.PieConnectorPlugin],
            options: {
                maintainAspectRatio: false,
                layout: { padding: 25 },
                cutout: '55%',
                plugins: {
                    legend: { 
                        display: true, 
                        position: 'bottom', 
                        labels: { 
                            color: '#000', 
                            usePointStyle: true, 
                            boxWidth: 10, 
                            padding: 40, 
                            font: { size: 12, weight: 'bold' } 
                        } 
                    },
                    datalabels: { 
                        display: function(context) {
                            return $('#toggleDataLabels').is(':checked');
                        },
                        anchor: 'end',
                        align: 'end',
                        offset: 12,
                        color: '#000',
                        font: { weight: 'bold', size: 11 },
                        formatter: function(value, context) {
                            const total = context.dataset.data.reduce((s, v) => s + v, 0);
                            const pct = total ? Math.round((value / total) * 100) : 0;
                            return pct >= 2 ? `${value.toLocaleString()} (${pct}%)` : '';
                        },
                        textAlign: 'center'
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const total = context.dataset.data.reduce((s, v) => s + v, 0);
                                const pct = total ? Math.round((context.parsed / total) * 100) : 0;
                                return `${context.label}: ${context.parsed.toLocaleString()} (${pct}%)`;
                            }
                        }
                    }
                }
            }
        });
    }

    function renderLineChartWithTrend(canvasId, chartData, chartRef) {
        const el = document.getElementById(canvasId);
        if (!el) return;
        const ctx = el.getContext('2d');
        if (window[chartRef]) window[chartRef].destroy();

        const labels = chartData.map(d => d.label);
        const values = chartData.map(d => d.value);
        const trend = computeTrendLine(values);

        window[chartRef] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Exposure',
                        data: values,
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245,158,11,0.12)',
                        pointBackgroundColor: '#f59e0b',
                        pointRadius: 3,
                        tension: 0.35,
                        fill: true,
                        borderWidth: 2
                    },
                    {
                        label: 'Trend',
                        data: trend,
                        borderColor: '#ef4444',
                        borderDash: [6, 3],
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        tension: 0
                    }
                ]
            },
            options: {
                maintainAspectRatio: false,
                layout: { padding: { top: 30 } },
                plugins: {
                    legend: { display: true, position: 'bottom', labels: { color: '#000', usePointStyle: true, boxWidth: 8, padding: 12 } },
                    datalabels: { 
                        display: function(context) {
                            if (!$('#toggleDataLabels').is(':checked')) return false;
                            return context.datasetIndex === 0;
                        },
                        align: 'top',
                        anchor: 'end',
                        color: '#f59e0b',
                        font: { weight: 'bold', size: 10 },
                        offset: 4,
                        formatter: function(value) {
                            return value.toLocaleString();
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const total = context.dataset.data.reduce((s, v) => s + (Number(v) || 0), 0) || 0;
                                const pct = total ? Math.round((Number(context.parsed) / total) * 100) : 0;
                                return `${context.dataset.label}: ${context.parsed.toLocaleString()} (${pct}%)`;
                            }
                        }
                    }
                },
                scales: {
                    y: { beginAtZero: true, grid: { display: false }, ticks: { color: '#000', precision: 0 } },
                    x: { grid: { display: false }, ticks: { color: '#000', maxRotation: 45, autoSkip: true, maxTicksLimit: 12 } }
                }
            }
        });
    }

    function loadData() {
        window.PramanaDashboard.initDataTable('#exposureTable', {
            ajaxUrl: '/exposure-session-dashboard/data',
            getFilters: function() {
                return {
                    region:  $('#regionFilter').val(),
                    program: $('#programFilter').val(),
                    year:    $('#yearFilter').val(),
                    month:   $('#monthFilter').val()
                };
            },
            onDataLoad: function(data) {
                if (data.kpis && data.kpis.length >= 4) {
                    $('#kpiStudents').text(data.kpis[0].value.toLocaleString());
                    $('#kpiBoys').text(data.kpis[1].value.toLocaleString());
                    $('#kpiGirls').text(data.kpis[2].value.toLocaleString());
                    $('#kpiSessions').text(data.kpis[3].value.toLocaleString());
                }
                if (data.charts) {
                    renderDoughnutChart('genderDoughnut', data.charts.gender_split || [], 'genderDoughnutInst');
                    renderLineChartWithTrend('exposureTrendLine', data.charts.exposure_by_month || [], 'exposureTrendLineInst');
                }
            },
            columns: [
                { data: 'region_name', className: 'font-weight-bold', width: '12%' },
                { data: 'area_name' },
                { data: 'program_name', width: '15%' },
                { data: 'session_date', className: 'text-center' },
                { data: 'school_name' },
                { data: 'class_name', className: 'text-center' },
                { data: 'boys', className: 'text-center' },
                { data: 'girls', className: 'text-center' },
                { data: 'total_exposure', className: 'text-center font-weight-bold' }
            ]
        });
    }

    $('#seeReport').click(() => { loadData(); });

    $('#resetFilters').click(function() {
        window.PramanaDashboard.resetTable('#exposureTable', loadData);
    });
    $('#exportXlsx').click(() => {
        const q = new URLSearchParams({ region: $('#regionFilter').val(), program: $('#programFilter').val(), year: $('#yearFilter').val(), month: $('#monthFilter').val() }).toString();
        window.exportToXLSX(`/exposure-session-dashboard/export?${q}`, 'exposure_session.xlsx');
    });

    $('#toggleDataLabels').change(function() {
        if (window.genderDoughnutInst) window.genderDoughnutInst.update();
        if (window.exposureTrendLineInst) window.exposureTrendLineInst.update();
    });

    setTimeout(loadData, 300);
});
</script>
{% endblock %}
