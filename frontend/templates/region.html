{% extends "base.html" %}

{% block content %}
<!-- KPI Grid -->
{% include "partials/kpi_cards.html" %}

<!-- Filters -->
<div class="card card-default">
    <div class="card-body">
        <div class="row align-items-end">
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Start Year</label>
                    <select id="startYear" class="form-control select2">
                        <option value="2020">2020</option>
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>End Year</label>
                    <select id="endYear" class="form-control select2">
                        <option value="2020">2020</option>
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Program</label>
                    <select id="programFilter" class="form-control select2">
                        <option value="">All Programs</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <button id="seeReport" class="btn btn-primary btn-sm btn-block">See Report</button>
            </div>
            <div class="col-md-1">
                <button id="exportXlsx" class="btn btn-export btn-sm btn-block">
                    <i class="fas fa-file-excel"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div class="row mt-2">
    <div class="col-lg-7 mb-3">
        <section class="card h-100 white-chart-card">
            <div class="card-header border-0 d-flex justify-content-between align-items-center">
                <h3 class="card-title">Region impact</h3>
                <i class="fas fa-info-circle text-muted ml-auto region-legend-trigger" 
                   style="cursor: pointer;"
                   data-toggle="popover" 
                   data-trigger="click" 
                   data-html="true"
                   tabindex="0"
                   title="Region Code Legend" 
                   data-content="Loading..."></i>
            </div>
            <div class="card-body">
                <div style="height:250px;">
                    <canvas id="regionStateChart"></canvas>
                </div>
            </div>
        </section>
    </div>
    <div class="col-lg-5 mb-3">
        <section class="card h-100 white-chart-card">
            <div class="card-header border-0"><h3 class="card-title">Monthly region impact</h3></div>
            <div class="card-body">
                <div style="height:250px;">
                    <canvas id="regionMonthlyChart"></canvas>
                </div>
            </div>
        </section>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    let regionMapping = {};
    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    // Initialize popovers
    $('.region-legend-trigger').popover({
        html: true,
        sanitize: false,
        trigger: 'click',
        placement: 'bottom'
    });

    function getAcronym(str) {
        if (!str) return '';
        const parts = str.split('_');
        if (parts.length === 1 && str.length > 5) {
            return str.substring(0, 3).toUpperCase();
        }
        let acronym = '';
        parts.forEach(p => {
            if (p.length > 0) acronym += p[0].toUpperCase();
        });
        return acronym;
    }

    function updateLegendPopover() {
        let content = '<div class="small" style="max-height: 200px; overflow-y: auto;"><table class="table table-sm mb-0">';
        const sortedKeys = Object.keys(regionMapping).sort();
        if (sortedKeys.length === 0) {
            content = "No regions displayed";
        } else {
            sortedKeys.forEach(code => {
                content += `<tr><td class="font-weight-bold pr-2" style="border-top:0">${code}</td><td style="border-top:0">: ${regionMapping[code]}</td></tr>`;
            });
            content += '</table></div>';
        }
        $('.region-legend-trigger').each(function() {
            $(this).attr('data-content', content);
            const popover = $(this).data('bs.popover');
            if (popover) popover.config.content = content;
        });
    }

    const rf = $('#regionFilter');
    const pf = $('#programFilter');

    // Initially disable programs
    pf.prop('disabled', true);

    fetch('/dashboard/filters')
        .then(res => res.json())
        .then(data => {
            data.regions.forEach(r => rf.append(new Option(r, r)));
        });

    rf.on('change', function () {
        const selectedRegion = $(this).val();
        pf.empty().append(new Option('All Programs', ''));
        
        if (selectedRegion) {
            fetch(`/dashboard/filters?region_name=${encodeURIComponent(selectedRegion)}`)
                .then(res => res.json())
                .then(data => {
                    data.programs.forEach(p => pf.append(new Option(p, p)));
                    pf.prop('disabled', false);
                });
        } else {
            pf.prop('disabled', true);
        }
    });


    function loadData() {
        const filters = {
            start_year: $('#startYear').val(),
            end_year: $('#endYear').val(),
            region: $('#regionFilter').val(),
            program: $('#programFilter').val()
        };
        
        const query = new URLSearchParams(filters).toString();
        fetch(`/region/data?${query}`)
            .then(res => res.json())
            .then(data => {
                $('#regionStudentsReached').text(data.kpis.total_students.toLocaleString());
                $('#regionStates').text(data.kpis.total_states);
                $('#regionPrograms').text(data.kpis.total_programs);
                $('#regionAverageImpact').text(data.kpis.average_impact.toLocaleString());

                // State Chart
                const ctxState = document.getElementById('regionStateChart').getContext('2d');
                if (window.stateChart) window.stateChart.destroy();
                regionMapping = {};
                if (data.charts.state.labels) {
                    data.charts.state.labels = data.charts.state.labels.map(label => {
                        const code = getAcronym(label);
                        regionMapping[code] = label;
                        return code;
                    });
                }

                window.stateChart = new Chart(ctxState, {
                    type: 'bar',
                    data: data.charts.state,
                    options: { 
                        maintainAspectRatio: false, 
                        plugins: {
                            legend: {
                                display: true,
                                position: 'bottom',
                                align: 'start',
                                labels: { color: '#000000' }
                            },
                            tooltip: {
                                callbacks: {
                                    title: function(context) {
                                        const code = context[0].label;
                                        return regionMapping[code] || code;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { display: false },
                                ticks: { color: '#000000' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { 
                                    color: '#000000',
                                    autoSkip: false,
                                    maxRotation: 0,
                                    minRotation: 0
                                }
                            }
                        }
                    }
                });
                
                updateLegendPopover();

                // Monthly Chart
                const ctxMonthly = document.getElementById('regionMonthlyChart').getContext('2d');
                if (window.monthlyChart) window.monthlyChart.destroy();
                window.monthlyChart = new Chart(ctxMonthly, {
                    type: 'line',
                    data: data.charts.monthly,
                    options: { 
                        maintainAspectRatio: false, 
                        plugins: {
                            legend: {
                                display: true,
                                position: 'bottom',
                                align: 'start',
                                labels: { color: '#000000' }
                            }


                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { display: false },
                                ticks: { color: '#000000' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#000000' }
                            }
                        }
                    }
                });
            });
    }

    $('#seeReport').click(function() {
        loadData();
    });

    $('#exportXlsx').click(function() {
        const filters = {
            start_year: $('#startYear').val(),
            end_year: $('#endYear').val(),
            region: $('#regionFilter').val(),
            program: $('#programFilter').val()
        };
        const query = new URLSearchParams(filters).toString();
        window.exportToXLSX(`/region/export?${query}`, 'region_report.xlsx');
    });

    // Auto-load
    setTimeout(loadData, 300);
});
</script>
{% endblock %}
