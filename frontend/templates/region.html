{% extends "base.html" %}

{% block content %}
<!-- KPI Grid -->
{% include "partials/kpi_cards.html" %}

<!-- Filters -->
<div class="card card-default premium-card shadow-sm mb-4">
    <div class="card-body p-3">
        <div class="row align-items-end">
            <div class="col-md-3">
                <div class="form-group mb-0">
                    <label class="small text-muted font-weight-bold uppercase">Financial Years</label>
                    <select id="yearFilter" class="form-control select2 filter-multi" data-filter="years" multiple data-placeholder="Select Years">
                    </select>
                </div>
            </div>
            <div class="col-md-3">
                <div class="form-group mb-0">
                    <label class="small text-muted font-weight-bold uppercase">Region</label>
                    <select id="regionFilter" class="form-control select2 filter-multi" data-filter="region" multiple data-placeholder="Select Regions">
                    </select>
                </div>
            </div>
            <div class="col-md-3">
                <div class="form-group mb-0">
                    <label class="small text-muted font-weight-bold uppercase">Program</label>
                    <select id="programFilter" class="form-control select2 filter-multi" data-filter="program" multiple data-placeholder="Select Programs">
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <button id="seeReport" class="btn btn-primary btn-block shadow-sm" style="border-radius: 8px;">
                    <i class="fas fa-sync-alt mr-2"></i>Apply
                </button>
            </div>
            <div class="col-md-1">
                <button id="exportXlsx" class="btn btn-outline-success btn-block shadow-sm" style="border-radius: 8px;">
                    <i class="fas fa-file-excel"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div class="row mt-2">
    <div class="col-lg-7 mb-3">
        <section class="card h-100 white-chart-card premium-card shadow-sm">
            <div class="card-header border-0 d-flex justify-content-between align-items-center bg-transparent pt-3">
                <h3 class="card-title text-sm uppercase">Region Impact</h3>
                <i class="fas fa-info-circle text-muted ml-auto region-legend-trigger" 
                   style="cursor: pointer;"
                   data-toggle="popover" 
                   data-trigger="click" 
                   data-html="true"
                   tabindex="0"
                   title="Region Code Legend" 
                   data-content="Loading..."></i>
            </div>
            <div class="card-body">
                <div style="height:300px;">
                    <canvas id="regionStateChart"></canvas>
                </div>
            </div>
        </section>
    </div>
    <div class="col-lg-5 mb-3">
        <section class="card h-100 white-chart-card premium-card shadow-sm">
            <div class="card-header border-0 bg-transparent pt-3">
                <h3 class="card-title text-sm uppercase">Monthly Region Impact</h3>
            </div>
            <div class="card-body">
                <div style="height:300px;">
                    <canvas id="regionMonthlyChart"></canvas>
                </div>
            </div>
        </section>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    let regionMapping = {};
    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4', width: '100%' });
    }

    // Initialize popovers
    $('.region-legend-trigger').popover({
        html: true,
        sanitize: false,
        trigger: 'click',
        placement: 'bottom'
    });

    function getAcronym(str) {
        if (!str) return '';
        const parts = str.split(/[ \-_]/);
        if (parts.length === 1 && str.length > 8) return str.substring(0, 3).toUpperCase();
        let acronym = '';
        parts.forEach(p => { if (p.length > 0) acronym += p[0].toUpperCase(); });
        return acronym.length > 1 ? acronym : str.substring(0, 3).toUpperCase();
    }

    function updateLegendPopover() {
        let content = '<div class="region-mapping-popover"><table class="table table-sm pb-0 mb-0" style="font-size:11px">';
        const sortedKeys = Object.keys(regionMapping).sort();
        if (sortedKeys.length === 0) {
            content = "No data available";
        } else {
            sortedKeys.forEach(code => {
                content += `<tr><td class="font-weight-bold pr-2" style="border-top:0">${code}</td><td style="border-top:0">: ${regionMapping[code]}</td></tr>`;
            });
            content += '</table></div>';
        }
        $('.region-legend-trigger').attr('data-content', content);
    }

    // Load Initial Filters
    fetch('/dashboard/filters')
        .then(res => res.json())
        .then(data => {
            const yf = $('#yearFilter');
            const rf = $('#regionFilter');
            const pf = $('#programFilter');
            
            data.years.forEach(y => yf.append(new Option(y, y)));
            data.regions.forEach(r => rf.append(new Option(r, r)));
            data.programs.forEach(p => pf.append(new Option(p, p)));
            
            // Set dynamic defaults
            const currentYear = new Date().getFullYear().toString();
            if (data.years.includes(parseInt(currentYear))) {
                yf.val([currentYear]);
            }
            $('.select2').trigger('change.select2', { internal: true });
            
            loadData();
        });

    function loadData() {
        const filters = window.PramanaDashboard.collectFilters();
        const query = $.param(filters, true);
        
        fetch(`/region/data?${query}`)
            .then(res => res.json())
            .then(data => {
                // Update KPIs
                $('#kpi_total_students_reached').text(data.kpis.total_students_reached.toLocaleString());
                $('#kpi_total_states').text(data.kpis.total_states.toLocaleString());
                $('#kpi_total_sessions').text(data.kpis.total_sessions.toLocaleString());
                $('#kpi_avg_students_per_state_period').text(data.kpis.avg_students_per_state_period.toLocaleString());

                // State Chart
                const ctxState = document.getElementById('regionStateChart').getContext('2d');
                if (window.stateChart) window.stateChart.destroy();
                
                regionMapping = {};
                const labels = data.impact.map(item => {
                    const code = getAcronym(item.label);
                    regionMapping[code] = item.label;
                    return code;
                });
                const values = data.impact.map(item => item.value);

                window.stateChart = new Chart(ctxState, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Students Reached',
                            data: values,
                            backgroundColor: '#3b82f6',
                            borderRadius: 6
                        }]
                    },
                    options: { 
                        maintainAspectRatio: false, 
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    title: (ctx) => regionMapping[ctx[0].label] || ctx[0].label
                                }
                            }
                        },
                        scales: {
                            y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { color: '#64748b' } },
                            x: { grid: { display: false }, ticks: { color: '#64748b' } }
                        }
                    }
                });
                
                updateLegendPopover();

                // Monthly Chart
                const ctxMonthly = document.getElementById('regionMonthlyChart').getContext('2d');
                if (window.monthlyChart) window.monthlyChart.destroy();
                
                window.monthlyChart = new Chart(ctxMonthly, {
                    type: 'line',
                    data: {
                        labels: data.monthly_impact.map(d => d.label),
                        datasets: [{
                            label: 'Monthly Students',
                            data: data.monthly_impact.map(d => d.value),
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16,185,129,0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: { 
                        maintainAspectRatio: false, 
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { color: '#64748b' } },
                            x: { grid: { display: false }, ticks: { color: '#64748b' } }
                        }
                    }
                });
            });
    }

    $('#seeReport').click(function() {
        loadData();
    });

    $('#exportXlsx').click(function() {
        const filters = window.PramanaDashboard.collectFilters();
        const query = $.param(filters, true);
        window.exportToXLSX(`/region/export?${query}`, 'region_report.xlsx');
    });
});
</script>
{% endblock %}
