{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">Select Region</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Center</label>
                    <select id="areaFilter" class="form-control select2">
                        <option value="">Select Center</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">Select Year</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">Select Month</option>
                    </select>
                </div>
                <hr>
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="resetFilters" class="btn btn-block btn-reset-filters">
                    <i class="fas fa-undo mr-1"></i> Reset All
                </button>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- Dynamic KPI Cards (4 Cards) -->
        <div id="kpiContainer" class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiTotalKMs">0</h3>
                        <p>Total KMs</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-road"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiAvgKmDay">0</h3>
                        <p>Cumulative Avg KM/Day</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-tachometer-alt"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiFuelQty">0</h3>
                        <p>Total Fuel Quantity</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-gas-pump"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiFuelCost">0</h3>
                        <p>Total Fuel Cost</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-rupee-sign"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card mt-2">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="vehicleTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Vehicle Name</th>
                                <th>Date</th>
                                <th>Registration No</th>
                                <th>Center Name</th>
                                <th>Region Name</th>
                                <th>Driver Name</th>
                                <th class="text-center">Initial KM</th>
                                <th class="text-center">End KM</th>
                                <th class="text-center">Total KMs</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;

    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    let filtersInitialized = false;

    function fetchFilters() {
        const region = $('#regionFilter').val();
        fetch(`/api/vehicle-report/filters?region_name=${region}`)
            .then(res => res.json())
            .then(data => {
                const areaSelect = $('#areaFilter');
                const regionSelect = $('#regionFilter');
                const yearSelect = $('#yearFilter');
                const monthSelect = $('#monthFilter');

                if (!filtersInitialized) {
                    // Populate static-ish filters only once
                    data.regions.forEach(r => regionSelect.append(new Option(r, r)));
                    data.years.forEach(y => yearSelect.append(new Option(y, y)));
                    data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
                    filtersInitialized = true;
                }

                // Update area select (dynamic based on region)
                const currentArea = areaSelect.val();
                areaSelect.empty().append(new Option("Select Center", ""));
                data.areas.forEach(a => areaSelect.append(new Option(a, a)));
                if (currentArea && data.areas.includes(currentArea)) {
                    areaSelect.val(currentArea);
                }
            });
    }

    $('#regionFilter').on('change', fetchFilters);

    function loadData() {
        window.loadReportData = loadData;
        window.PramanaDashboard.initDataTable('#vehicleTable', {
            ajaxUrl: '/api/vehicle-report/data',
            getFilters: function() {
                return {
                    region: $('#regionFilter').val(),
                    area: $('#areaFilter').val(),
                    year: $('#yearFilter').val(),
                    month: $('#monthFilter').val()
                };
            },
            onDataLoad: function(data) {
                // Update KPIs
                if (data.kpis && data.kpis.length >= 4) {
                    $('#kpiTotalKMs').text((data.kpis[0].value || 0).toLocaleString());
                    $('#kpiAvgKmDay').text((data.kpis[1].value || 0).toLocaleString());
                    $('#kpiFuelQty').text((data.kpis[2].value || 0).toLocaleString());
                    $('#kpiFuelCost').text((data.kpis[3].value || 0).toLocaleString());
                }
            },
            columns: [
                { data: 'vehicle_name', render: function(data) {
                    return `<strong>${data || 'N/A'}</strong>`;
                }},
                { data: 'date' },
                { data: 'registration_no', render: function(data) {
                    return `<span class="badge badge-secondary">${data || 'N/A'}</span>`;
                }},
                { data: 'center_name' },
                { data: 'region_name' },
                { data: 'driver_name' },
                { data: 'initial_km', className: 'text-center', render: function(data) {
                    return (data || 0).toLocaleString();
                }},
                { data: 'end_km', className: 'text-center', render: function(data) {
                    return (data || 0).toLocaleString();
                }},
                { data: 'total_kms', className: 'text-center font-weight-bold text-info', render: function(data) {
                    return (data || 0).toLocaleString();
                }}
            ]
        });
    }

    $('#seeReport').click(function () {
        loadData();
    });

    $('#resetFilters').click(function() {
        window.PramanaDashboard.resetTable('#vehicleTable', loadData);
    });

    // Initial load
    fetchFilters();
    setTimeout(loadData, 300);
});
</script>
{% endblock %}
