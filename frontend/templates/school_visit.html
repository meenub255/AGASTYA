{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Area</label>
                    <select id="areaFilter" class="form-control select2">
                        <option value="">All Areas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Program</label>
                    <select id="programFilter" class="form-control select2">
                        <option value="">All Programs</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">All Months</option>
                    </select>
                </div>
                <div class="form-group mb-2">
                    <div class="custom-control custom-switch">
                        <input type="checkbox" class="custom-control-input" id="toggleDataLabels" checked>
                        <label class="custom-control-label text-sm" for="toggleDataLabels">Show Data Labels</label>
                    </div>
                </div>
                <hr class="my-2">
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="resetFilters" class="btn btn-block btn-reset-filters mb-2">
                    <i class="fas fa-undo mr-1"></i> Reset All
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- Dynamic KPI Cards -->
        <div class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiTotalSchools">0</h3>
                        <p>Total Schools</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-school"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiTotalStudents">0</h3>
                        <p>Total Students</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiTotalSessions">0</h3>
                        <p>No of sessions</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiMonthlySessions">0</h3>
                        <p>Monthly sessions</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="card h-100 white-chart-card">
                    <div class="card-header border-0 pb-0 d-flex justify-content-between align-items-center">
                        <h3 class="card-title text-sm uppercase">Sessions by Program</h3>
                        <i class="fas fa-info-circle text-muted ml-auto acronym-legend-trigger" 
                           style="cursor: pointer;"
                           data-toggle="popover" 
                           data-trigger="click" 
                           data-html="true"
                           tabindex="0"
                           title="Program Code Legend" 
                           data-content="Loading..."></i>
                    </div>
                    <div class="card-body">
                        <div style="height:260px"><canvas id="sessionsProgramPie"></canvas></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100 white-chart-card">
                    <div class="card-header border-0 pb-0">
                        <h3 class="card-title text-sm uppercase">Sessions Trend by Month</h3>
                    </div>
                    <div class="card-body">
                        <div style="height:260px"><canvas id="sessionsTrendLine"></canvas></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card mt-2">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="visitTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>School Name</th>
                                <th>Program Name</th>
                                <th>Class</th>
                                <th>SECTION</th>
                                <th class="text-center">No. of Sessions</th>
                                <th class="text-center">Exposures</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
if (window.ChartDataLabels) { Chart.register(ChartDataLabels); }
$(function () {
    const pagination = window.PramanaPagination;
    let acronymMapping = {};
    const PIE_PALETTE = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];

    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    $('.acronym-legend-trigger').popover({
        html: true,
        sanitize: false,
        trigger: 'click',
        placement: 'bottom'
    });

    function getAcronym(str) {
        if (!str) return '';
        // Split by space, underscore, or hyphen
        const parts = str.split(/[ \-_]/);
        if (parts.length === 1 && str.length > 8) return str.substring(0, 3).toUpperCase();
        let acronym = '';
        parts.forEach(p => { if (p.length > 0) acronym += p[0].toUpperCase(); });
        // Handle short names that might still be descriptive
        return acronym.length > 1 ? acronym : str.substring(0, 3).toUpperCase();
    }

    function updateLegendPopover() {
        let content = '<div class="acronym-mapping-popover"><table class="table table-sm pb-0 mb-0" style="font-size:11px">';
        const sortedKeys = Object.keys(acronymMapping).sort();
        if (sortedKeys.length === 0) {
            content = "No data available";
        } else {
            sortedKeys.forEach(code => {
                const names = acronymMapping[code];
                const displayName = Array.isArray(names) ? names[0] + (names.length > 1 ? ` (+${names.length-1} more)` : '') : names;
                content += `<tr><td class="font-weight-bold pr-2" style="border-top:0">${code}</td><td style="border-top:0">: ${displayName}</td></tr>`;
            });
            content += '</table></div>';
        }
        $('.acronym-legend-trigger').attr('data-content', content);
    }

    function computeTrendLine(values) {
        const n = values.length;
        if (n < 2) return values.slice();
        let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
        for (let i = 0; i < n; i++) {
            sumX += i; sumY += values[i];
            sumXY += i * values[i]; sumXX += i * i;
        }
        const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
        const intercept = (sumY - slope * sumX) / n;
        return values.map((_, i) => Math.round(intercept + slope * i));
    }

    // Initial load: Only fetch regions
    function initFilters() {
        const regionSelect = $('#regionFilter');
        const areaSelect = $('#areaFilter');
        const programSelect = $('#programFilter');
        const yearSelect = $('#yearFilter');
        const monthSelect = $('#monthFilter');

        // Initially disable dependent filters
        areaSelect.prop('disabled', true);
        programSelect.prop('disabled', true);

        fetch('/school-visit/filters')
            .then(res => res.json())
            .then(data => {
                regionSelect.empty().append('<option value="">All Regions</option>');
                data.regions.forEach(r => regionSelect.append(new Option(r, r)));
                
                yearSelect.empty().append('<option value="">All Years</option>');
                data.years.forEach(y => yearSelect.append(new Option(y, y)));
                
                monthSelect.empty().append('<option value="">All Months</option>');
                data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
            });
    }

    function refreshDependentFilters(regionName) {
        const areaSelect = $('#areaFilter');
        const programSelect = $('#programFilter');

        if (!regionName) {
            areaSelect.empty().append('<option value="">All Areas</option>').prop('disabled', true);
            programSelect.empty().append('<option value="">All Programs</option>').prop('disabled', true);
            return;
        }

        fetch(`/school-visit/filters?region_name=${encodeURIComponent(regionName)}`)
            .then(res => res.json())
            .then(data => {
                areaSelect.empty().append('<option value="">All Areas</option>').prop('disabled', false);
                data.areas.forEach(a => areaSelect.append(new Option(a, a)));

                programSelect.empty().append('<option value="">All Programs</option>').prop('disabled', false);
                data.programs.forEach(p => programSelect.append(new Option(p, p)));
            });
    }

    $('#regionFilter').on('change', function() {
        refreshDependentFilters($(this).val());
    });

    function renderPieChart(canvasId, chartData, chartRef) {
        const el = document.getElementById(canvasId);
        if (!el) return;
        const ctx = el.getContext('2d');
        if (window[chartRef]) window[chartRef].destroy();

        // Aggregate by acronym
        const aggregated = {};
        chartData.forEach(d => {
            const code = getAcronym(d.label);
            if (!aggregated[code]) {
                aggregated[code] = { value: 0, labels: [] };
            }
            aggregated[code].value += d.value;
            if (!aggregated[code].labels.includes(d.label)) {
                aggregated[code].labels.push(d.label);
            }
            // Update acronymMapping for popover
            acronymMapping[code] = aggregated[code].labels;
        });

        const labels = Object.keys(aggregated);
        const values = labels.map(l => aggregated[l].value);

        window[chartRef] = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: PIE_PALETTE.slice(0, labels.length),
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: true, position: 'bottom', labels: { color: '#000', usePointStyle: true, boxWidth: 8, padding: 8, font: { size: 11 } } },
                    datalabels: { 
                        display: function(context) {
                            return $('#toggleDataLabels').is(':checked');
                        },
                        color: '#fff',
                        font: { weight: 'bold', size: 11 },
                        formatter: function(value, context) {
                            const total = context.dataset.data.reduce((s, v) => s + v, 0);
                            const pct = total ? Math.round((value / total) * 100) : 0;
                            return pct >= 4 ? `${value.toLocaleString()}\n(${pct}%)` : '';
                        },
                        textAlign: 'center'
                    },
                    tooltip: {
                        callbacks: {
                            title: function(context) {
                                const code = context[0].label;
                                const names = acronymMapping[code] || [];
                                return names.join(', ');
                            },
                            label: function(context) {
                                const total = context.dataset.data.reduce((s, v) => s + v, 0);
                                const pct = total ? Math.round((context.parsed / total) * 100) : 0;
                                return `Count: ${context.parsed.toLocaleString()} (${pct}%)`;
                            }
                        }
                    }
                }
            }
        });
        updateLegendPopover();
    }

    function renderLineChartWithTrend(canvasId, chartData, chartRef) {
        const el = document.getElementById(canvasId);
        if (!el) return;
        const ctx = el.getContext('2d');
        if (window[chartRef]) window[chartRef].destroy();

        const labels = chartData.map(d => d.label);
        const values = chartData.map(d => d.value);
        const trend = computeTrendLine(values);

        window[chartRef] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Sessions',
                        data: values,
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139,92,246,0.12)',
                        pointBackgroundColor: '#8b5cf6',
                        pointRadius: 3,
                        tension: 0.35,
                        fill: true,
                        borderWidth: 2
                    },
                    {
                        label: 'Trend',
                        data: trend,
                        borderColor: '#ef4444',
                        borderDash: [6, 3],
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        tension: 0
                    }
                ]
            },
            options: {
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: true, position: 'bottom', labels: { color: '#000', usePointStyle: true, boxWidth: 8, padding: 12 } },
                    datalabels: { 
                        display: function(context) {
                            if (!$('#toggleDataLabels').is(':checked')) return false;
                            return context.datasetIndex === 0;
                        },
                        align: 'top',
                        anchor: 'end',
                        color: '#8b5cf6',
                        font: { weight: 'bold', size: 10 },
                        offset: 4,
                        formatter: function(value) {
                            return value.toLocaleString();
                        }
                    }
                },
                scales: {
                    y: { beginAtZero: true, grid: { display: false }, ticks: { color: '#000', precision: 0 } },
                    x: { grid: { display: false }, ticks: { color: '#000', maxRotation: 45, autoSkip: true, maxTicksLimit: 12 } }
                }
            }
        });
    }

    function loadData() {
        window.PramanaDashboard.initDataTable('#visitTable', {
            ajaxUrl: '/school-visit/data',
            getFilters: function() {
                return {
                    region: $('#regionFilter').val(),
                    area: $('#areaFilter').val(),
                    program: $('#programFilter').val(),
                    year: $('#yearFilter').val(),
                    month: $('#monthFilter').val()
                };
            },
            onDataLoad: function(data) {
                // Update KPIs
                if (data.kpis) {
                    $('#kpiTotalSchools').text(data.kpis.total_schools.toLocaleString());
                    $('#kpiTotalStudents').text(data.kpis.total_students.toLocaleString());
                    $('#kpiTotalSessions').text(data.kpis.total_sessions.toLocaleString());
                    $('#kpiMonthlySessions').text(data.kpis.monthly_sessions.toLocaleString());
                }
                if (data.charts) {
                    acronymMapping = {}; // Reset mapping for this load
                    renderPieChart('sessionsProgramPie', data.charts.sessions_by_program || [], 'sessionsProgramPieInst');
                    renderLineChartWithTrend('sessionsTrendLine', data.charts.sessions_by_month || [], 'sessionsTrendLineInst');
                }
            },
            columns: [
                { data: 'school_name', render: function(data) {
                    return `<strong>${data}</strong>`;
                }},
                { data: 'program_name', render: function(data) {
                    return `<span class="badge badge-info">${data}</span>`;
                }},
                { data: 'class_name' },
                { data: 'section_name' },
                { data: 'sessions', className: 'text-center font-weight-bold' },
                { data: 'exposures', className: 'text-center font-weight-bold text-primary', render: function(data) {
                    return data.toLocaleString();
                }}
            ]
        });
    }

    $('#seeReport').click(function () {
        loadData();
    });

    $('#resetFilters').click(function() {
        window.PramanaDashboard.resetTable('#visitTable', loadData);
    });

    $('#exportXlsx').click(function() {
        const filters = {
            region: $('#regionFilter').val(),
            area: $('#areaFilter').val(),
            program: $('#programFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val()
        };
        const query = new URLSearchParams(filters).toString();
        window.exportToXLSX(`/school-visit/export?${query}`, 'school_visits.xlsx');
    });

    // Initialize
    initFilters();
    setTimeout(loadData, 400);
});
</script>

{% endblock %}
