{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Filter Pane -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Instructor</label>
                    <select id="instructorFilter" class="form-control select2">
                        <option value="">All Instructors</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <hr>
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="resetFilters" class="btn btn-block btn-reset-filters mb-2">
                    <i class="fas fa-undo mr-1"></i> Reset All
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="col-md-10">
        <div class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner"><h3 id="kpiInstructors">0</h3><p>Instructors Reviewed</p></div>
                    <div class="icon"><i class="fas fa-users"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner"><h3 id="kpiSessions">0</h3><p>Total Sessions</p></div>
                    <div class="icon"><i class="fas fa-chalkboard-teacher"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner"><h3 id="kpiDemo">0</h3><p>Demo Sessions</p></div>
                    <div class="icon"><i class="fas fa-flask"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner"><h3 id="kpiHandsOn">0</h3><p>Hands-on Sessions</p></div>
                    <div class="icon"><i class="fas fa-hands"></i></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="feedbackTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Instructor</th>
                                <th>Date</th>
                                <th>School</th>
                                <th>Activity</th>
                                <th class="text-center">Demo Sessions</th>
                                <th class="text-center">Hands-on</th>
                                <th class="text-center">Duration (min)</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;
    if ($.fn.select2) $('.select2').select2({ theme: 'bootstrap4' });

    fetch('/instructor-feedback/filters')
        .then(r => r.json())
        .then(data => {
            data.instructors.forEach(i => $('#instructorFilter').append(new Option(i, i)));
            data.years.forEach(y => $('#yearFilter').append(new Option(y, y)));
        });

    function loadData() {
        window.PramanaDashboard.initDataTable('#feedbackTable', {
            ajaxUrl: '/instructor-feedback/data',
            getFilters: function() {
                return {
                    instructor_name: $('#instructorFilter').val(),
                    year:            $('#yearFilter').val()
                };
            },
            onDataLoad: function(data) {
                if (data.kpis && data.kpis.length >= 4) {
                    $('#kpiInstructors').text(data.kpis[0].value.toLocaleString());
                    $('#kpiSessions').text(data.kpis[1].value.toLocaleString());
                    $('#kpiDemo').text(data.kpis[2].value.toLocaleString());
                    $('#kpiHandsOn').text(data.kpis[3].value.toLocaleString());
                }
            },
            columns: [
                { data: 'instructor_name', className: 'font-weight-bold', width: '15%' },
                { data: 'session_date', className: 'text-center' },
                { data: 'school_name', width: '20%' },
                { data: 'activity_name', render: function(data) {
                    return `<span class="badge badge-info">${data}</span>`;
                }},
                { data: 'demo_sessions', className: 'text-center', render: function(data) {
                    return (data||0).toLocaleString();
                }},
                { data: 'hands_on_sessions', className: 'text-center', render: function(data) {
                    return (data||0).toLocaleString();
                }},
                { data: 'duration_minutes', className: 'text-center', render: function(data) {
                    return (data||0).toLocaleString();
                }}
            ]
        });
    }

    $('#seeReport').click(() => { loadData(); });

    $('#resetFilters').click(function() {
        window.PramanaDashboard.resetTable('#feedbackTable', loadData);
    });
    $('#exportXlsx').click(() => {
        const q = new URLSearchParams({ instructor_name: $('#instructorFilter').val(), year: $('#yearFilter').val() }).toString();
        window.exportToXLSX(`/instructor-feedback/export?${q}`, 'instructor_feedback.xlsx');
    });

    setTimeout(loadData, 300);
});
</script>
{% endblock %}
