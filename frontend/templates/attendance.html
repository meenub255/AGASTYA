{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Area</label>
                    <select id="areaFilter" class="form-control select2">
                        <option value="">All Areas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">All Months</option>
                    </select>
                </div>
                <hr>
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="resetFilters" class="btn btn-block btn-reset-filters mb-2">
                    <i class="fas fa-undo mr-1"></i> Reset All
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- KPI Cards -->
        <div id="kpiContainer" class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiTotalStaff">0</h3>
                        <p>Total Field Staff</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-users-cog"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiTotalDays">0</h3>
                        <p>Cumulative Days Present</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiTotalSessions">0</h3>
                        <p>Total Sessions Conducted</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiAvgSessions">0</h3>
                        <p>Avg Sessions / Day</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card mt-2">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="attendanceTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Instructor</th>
                                <th>Region</th>
                                <th>Area</th>
                                <th class="text-center">Days Present</th>
                                <th class="text-center">Total Sessions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;

    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    fetch('/attendance/filters')
        .then(res => res.json())
        .then(data => {
            const regionSelect = $('#regionFilter');
            const areaSelect = $('#areaFilter');
            const yearSelect = $('#yearFilter');
            const monthSelect = $('#monthFilter');

            data.regions.forEach(r => regionSelect.append(new Option(r, r)));
            data.areas.forEach(a => areaSelect.append(new Option(a, a)));
            data.years.forEach(y => yearSelect.append(new Option(y, y)));
            data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
        });

    function loadData() {
        // Initialize or reload DataTable with server-side processing
        window.PramanaDashboard.initDataTable('#attendanceTable', {
            ajaxUrl: '/attendance/data',
            getFilters: function() {
                return {
                    region: $('#regionFilter').val(),
                    area: $('#areaFilter').val(),
                    year: $('#yearFilter').val(),
                    month: $('#monthFilter').val()
                };
            },
            onDataLoad: function(data) {
                // Update KPIs
                if (data.kpis && data.kpis.length >= 4) {
                    $('#kpiTotalStaff').text(data.kpis[0].value.toLocaleString());
                    $('#kpiTotalDays').text(data.kpis[1].value.toLocaleString());
                    $('#kpiTotalSessions').text(data.kpis[2].value.toLocaleString());
                    $('#kpiAvgSessions').text(data.kpis[3].value);
                }
            },
            columns: [
                { data: 'instructor_name', render: function(data) {
                    return `<span class="font-weight-bold text-navy">${data}</span>`;
                }},
                { data: 'region', render: function(data) {
                    return `<small class="text-muted"><i class="fas fa-globe mr-1"></i> ${data}</small>`;
                }},
                { data: 'area' },
                { data: 'days_present', className: 'text-center', render: function(data) {
                    return `<span class="badge badge-success px-2 py-1">${data}</span>`;
                }},
                { data: 'total_sessions', className: 'text-center font-weight-bold' }
            ]
        });
    }

    $('#seeReport').click(function () {
        loadData();
    });

    $('#resetFilters').click(function() {
        window.PramanaDashboard.resetTable('#attendanceTable', loadData);
    });

    $('#exportXlsx').click(function() {
        const filters = {
            region: $('#regionFilter').val(),
            area: $('#areaFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val()
        };
        const query = new URLSearchParams(filters).toString();
        window.exportToXLSX(`/attendance/export?${query}`, 'attendance_report.xlsx');
    });

    // Auto-load
    setTimeout(loadData, 300);
});
</script>
{% endblock %}
