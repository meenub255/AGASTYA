{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card filter-card shadow-lg">
            <div class="card-header">
                <h3 class="card-title text-bold"><i class="fas fa-filter mr-2"></i>Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group mb-4">
                    <label class="filter-label">Region</label>
                    <select id="regionFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="region" data-placeholder="Select Region">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Year</label>
                    <select id="yearFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="year" data-placeholder="Select Year">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Month</label>
                    <select id="monthFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="month" data-placeholder="Select Month">
                    </select>
                </div>
                
                <div class="mt-5">
                    <button id="seeReport" class="btn btn-primary btn-block btn-premium mb-3">
                        <i class="fas fa-sync-alt mr-2"></i>See Report
                    </button>
                    <button id="resetFilters" class="btn btn-outline-light btn-block btn-premium mb-3" style="border-color: rgba(255,255,255,0.2)">
                        <i class="fas fa-undo mr-2"></i>Reset All
                    </button>
                    <button id="exportXlsx" class="btn btn-success btn-block btn-premium mb-3">
                        <i class="fas fa-file-excel mr-2"></i>Export XLSX
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="col-md-10">
        <div class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner"><h3 id="kpiKms">0</h3><p>Total KMs Travelled</p></div>
                    <div class="icon"><i class="fas fa-road"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner"><h3 id="kpiFuelCost">0</h3><p>Total Fuel Cost (₹)</p></div>
                    <div class="icon"><i class="fas fa-rupee-sign"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner"><h3 id="kpiFuelQty">0</h3><p>Total Fuel (L)</p></div>
                    <div class="icon"><i class="fas fa-gas-pump"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner"><h3 id="kpiDrivers">0</h3><p>Active Drivers</p></div>
                    <div class="icon"><i class="fas fa-truck"></i></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="vehicleTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Region</th>
                                <th>Program</th>
                                <th class="text-center">Drivers</th>
                                <th class="text-center">Total KMs</th>
                                <th class="text-center">Total Fuel (L)</th>
                                <th class="text-center">Total Cost (₹)</th>
                                <th class="text-center">Vehicles Used</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;
    // Premium Multi-filter initialization
    if ($.fn.select2) {
        window.PramanaDashboard.initMultiFilters();
    }

    fetch('/manpower-vehicle-dashboard/filters')
        .then(r => r.json())
        .then(data => {
            data.regions.forEach(r => $('#regionFilter').append(new Option(r, r)));
            data.years.forEach(y => $('#yearFilter').append(new Option(y, y)));
            data.months.forEach(m => $('#monthFilter').append(new Option(m.name, m.id)));
        });

    function loadData() {
        window.loadReportData = loadData;
        window.PramanaDashboard.initDataTable('#vehicleTable', {
            ajaxUrl: '/manpower-vehicle/data',
            getFilters: function() {
                return window.PramanaDashboard.collectFilters();
            },
            onDataLoad: function(data) {
                if (data.kpis && data.kpis.length >= 4) {
                    $('#kpiKms').text(data.kpis[0].value.toLocaleString());
                    $('#kpiFuelCost').text(data.kpis[1].value.toLocaleString());
                    $('#kpiFuelQty').text(data.kpis[2].value.toLocaleString());
                    $('#kpiDrivers').text(data.kpis[3].value.toLocaleString());
                }
            },
            columns: [
                { data: 'region_name', className: 'font-weight-bold' },
                { data: 'program_name' },
                { data: 'drivers', className: 'text-center', render: function(data) {
                    return (data||0).toLocaleString();
                }},
                { data: 'total_kms', className: 'text-center font-weight-bold', render: function(data) {
                    return (data||0).toLocaleString();
                }},
                { data: 'total_fuel_l', className: 'text-center', render: function(data) {
                    return (data||0).toLocaleString();
                }},
                { data: 'total_cost', className: 'text-center text-danger font-weight-bold', render: function(data) {
                    return '₹' + parseFloat(data||0).toLocaleString();
                }},
                { data: 'vehicles_used', className: 'text-center', render: function(data) {
                    return `<span class="badge badge-info">${data||0}</span>`;
                }}
            ]
        });
    }

    $('#seeReport').click(() => { loadData(); });

    $('#resetFilters').click(function() {
        window.PramanaDashboard.resetTable('#vehicleTable', loadData);
    });
    $('#exportXlsx').click(() => {
        const filters = window.PramanaDashboard.collectFilters();
        const q = $.param(filters, true);
        window.exportToXLSX(`/manpower-vehicle-dashboard/export?${q}`, 'manpower_vehicle.xlsx');
    });

    setTimeout(loadData, 300);
});
</script>
{% endblock %}
