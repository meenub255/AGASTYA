{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Filter Pane -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Start Year</label>
                    <select id="startYear" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>End Year</label>
                    <select id="endYear" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div class="form-group mb-2">
                    <div class="custom-control custom-switch">
                        <input type="checkbox" class="custom-control-input" id="toggleDataLabels" checked>
                        <label class="custom-control-label text-sm" for="toggleDataLabels">Show Data Labels</label>
                    </div>
                </div>
                <hr class="my-2">
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="resetFilters" class="btn btn-block btn-reset-filters mb-2">
                    <i class="fas fa-undo mr-1"></i> Reset All
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="col-md-10">
        <!-- KPI Cards -->
        <div class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiInstructors">0</h3>
                        <p>Total Instructors</p>
                    </div>
                    <div class="icon"><i class="fas fa-users"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiDrivers">0</h3>
                        <p>Total Drivers</p>
                    </div>
                    <div class="icon"><i class="fas fa-truck"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiStates">0</h3>
                        <p>States Reached</p>
                    </div>
                    <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiPrograms">0</h3>
                        <p>Total Programs</p>
                    </div>
                    <div class="icon"><i class="fas fa-project-diagram"></i></div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="card h-100 white-chart-card">
                    <div class="card-header border-0 pb-0 d-flex justify-content-between align-items-center">
                        <h3 class="card-title text-sm uppercase">Monthly Sessions Trend</h3>
                    </div>
                    <div class="card-body">
                        <div style="height:260px"><canvas id="sessionsTrendChart"></canvas></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100 white-chart-card">
                    <div class="card-header border-0 pb-0 d-flex justify-content-between align-items-center">
                        <h3 class="card-title text-sm uppercase">Students Reached by Region</h3>
                        <i class="fas fa-info-circle text-muted ml-auto region-legend-trigger" 
                           style="cursor: pointer;"
                           data-toggle="popover" 
                           data-trigger="click" 
                           data-html="true"
                           tabindex="0"
                           title="Region Code Legend" 
                           data-content="Loading..."></i>
                    </div>
                    <div class="card-body">
                        <div style="height:260px"><canvas id="studentsRegionChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card white-chart-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="nationwideTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Region</th>
                                <th>Sessions</th>
                                <th>Schools</th>
                                <th>Exposures</th>
                                <th>Instructors</th>
                                <th>Drivers</th>
                                <th>Programs</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    if (window.ChartDataLabels) { Chart.register(ChartDataLabels); }
    $(function () {
        const pagination = window.PramanaPagination;
        let regionMapping = {};

        if ($.fn.select2) $('.select2').select2({ theme: 'bootstrap4' });

        const PIE_PALETTE = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];

        $('.region-legend-trigger').popover({
            html: true,
            sanitize: false,
            trigger: 'click',
            placement: 'bottom'
        });

        function getAcronym(str) {
            if (!str) return '';
            // Split by space, underscore, or hyphen
            const parts = str.split(/[ \-_]/);
            if (parts.length === 1 && str.length > 8) return str.substring(0, 3).toUpperCase();
            let acronym = '';
            parts.forEach(p => { if (p.length > 0) acronym += p[0].toUpperCase(); });
            // Handle short names that might still be descriptive
            return acronym.length > 1 ? acronym : str.substring(0, 3).toUpperCase();
        }

        function updateLegendPopover() {
            let content = '<div class="region-mapping-popover"><table class="table table-sm pb-0 mb-0" style="font-size:11px">';
            const sortedKeys = Object.keys(regionMapping).sort();
            if (sortedKeys.length === 0) {
                content = "No data available";
            } else {
                sortedKeys.forEach(code => {
                    const names = regionMapping[code];
                    const displayName = Array.isArray(names) ? names[0] + (names.length > 1 ? ` (+${names.length-1} more)` : '') : names;
                    content += `<tr><td class="font-weight-bold pr-2" style="border-top:0">${code}</td><td style="border-top:0">: ${displayName}</td></tr>`;
                });
                content += '</table></div>';
            }
            $('.region-legend-trigger').attr('data-content', content);
        }

        // --- Trend Line Utility ---
        function computeTrendLine(values) {
            const n = values.length;
            if (n < 2) return values.slice();
            let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
            for (let i = 0; i < n; i++) {
                sumX += i; sumY += values[i];
                sumXY += i * values[i]; sumXX += i * i;
            }
            const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
            const intercept = (sumY - slope * sumX) / n;
            return values.map((_, i) => Math.round(intercept + slope * i));
        }

        fetch('/nationwide/filters')
            .then(r => r.json())
            .then(data => {
                data.years.forEach(y => {
                    $('#startYear').append(new Option(y, y));
                    $('#endYear').append(new Option(y, y));
                });
                data.regions.forEach(r => $('#regionFilter').append(new Option(r, r)));
            });

        function renderLineChartWithTrend(canvasId, chartData, chartRef) {
            const el = document.getElementById(canvasId);
            if (!el) return;
            const ctx = el.getContext('2d');
            if (window[chartRef]) window[chartRef].destroy();

            const labels = chartData.map(d => d.label);
            const values = chartData.map(d => d.value);
            const trend = computeTrendLine(values);

            window[chartRef] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Sessions',
                            data: values,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59,130,246,0.12)',
                            pointBackgroundColor: '#3b82f6',
                            pointBorderColor: '#3b82f6',
                            pointRadius: 3,
                            tension: 0.35,
                            fill: true,
                            borderWidth: 2
                        },
                        {
                            label: 'Trend',
                            data: trend,
                            borderColor: '#ef4444',
                            borderDash: [6, 3],
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            tension: 0
                        }
                    ]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'bottom', labels: { color: '#000', usePointStyle: true, boxWidth: 8, padding: 12 } },
                        datalabels: { 
                            display: function(context) {
                                if (!$('#toggleDataLabels').is(':checked')) return false;
                                return context.datasetIndex === 0; // Only show for the main data line
                            },
                            align: 'top',
                            anchor: 'end',
                            color: '#3b82f6',
                            font: { weight: 'bold', size: 10 },
                            offset: 4,
                            formatter: function(value) {
                                return value.toLocaleString();
                            }
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { display: false }, ticks: { color: '#000', precision: 0 } },
                        x: { grid: { display: false }, ticks: { color: '#000', maxRotation: 45, autoSkip: true, maxTicksLimit: 12 } }
                    }
                }
            });
        }

        function renderPieChart(canvasId, chartData, chartRef) {
            const el = document.getElementById(canvasId);
            if (!el) return;
            const ctx = el.getContext('2d');
            if (window[chartRef]) window[chartRef].destroy();

            // Aggregate by acronym
            const aggregated = {};
            chartData.forEach(d => {
                const code = getAcronym(d.label);
                if (!aggregated[code]) {
                    aggregated[code] = { value: 0, labels: [] };
                }
                aggregated[code].value += d.value;
                if (!aggregated[code].labels.includes(d.label)) {
                    aggregated[code].labels.push(d.label);
                }
                regionMapping[code] = aggregated[code].labels;
            });

            const labels = Object.keys(aggregated);
            const values = labels.map(l => aggregated[l].value);

            window[chartRef] = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: PIE_PALETTE.slice(0, labels.length),
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'bottom', labels: { color: '#000', usePointStyle: true, boxWidth: 8, padding: 10, font: { size: 11 } } },
                        datalabels: { 
                            display: function(context) {
                                return $('#toggleDataLabels').is(':checked');
                            },
                            color: '#fff',
                            font: { weight: 'bold', size: 11 },
                            formatter: function(value, context) {
                                const total = context.dataset.data.reduce((s, v) => s + v, 0);
                                const pct = total ? Math.round((value / total) * 100) : 0;
                                return pct >= 4 ? `${value.toLocaleString()}\n(${pct}%)` : ''; // Only show if >= 4%
                            },
                            textAlign: 'center'
                        },
                        tooltip: {
                            callbacks: {
                                title: function(context) {
                                    const code = context[0].label;
                                    const names = regionMapping[code] || [];
                                    return names.join(', ');
                                },
                                label: function(context) {
                                    const total = context.dataset.data.reduce((s, v) => s + v, 0);
                                    const pct = total ? Math.round((context.parsed / total) * 100) : 0;
                                    return `Count: ${context.parsed.toLocaleString()} (${pct}%)`;
                                }
                            }
                        }
                    }
                }
            });
            updateLegendPopover();
        }

        function loadData() {
            window.loadReportData = loadData;
            window.PramanaDashboard.initDataTable('#nationwideTable', {
                ajaxUrl: '/nationwide/data',
                getFilters: function() {
                    return {
                        start_year: $('#startYear').val(),
                        end_year: $('#endYear').val(),
                        region: $('#regionFilter').val()
                    };
                },
                onDataLoad: function(data) {
                    if (data.kpis && data.kpis.length >= 4) {
                        $('#kpiInstructors').text(data.kpis[0].value.toLocaleString());
                        $('#kpiDrivers').text(data.kpis[1].value.toLocaleString());
                        $('#kpiStates').text(data.kpis[2].value.toLocaleString());
                        $('#kpiPrograms').text(data.kpis[3].value.toLocaleString());
                    }
                    if (data.charts) {
                        regionMapping = {}; // Reset mapping for this load
                        renderLineChartWithTrend('sessionsTrendChart', data.charts.sessions_trend_monthly || [], 'sessionsTrendInst');
                        renderPieChart('studentsRegionChart', data.charts.students_by_region || [], 'studentsRegionInst');
                    }
                },
                columns: [
                    { data: 'region_name', className: 'font-weight-bold' },
                    { data: 'sessions', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }},
                    { data: 'schools_visited', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }},
                    { data: 'students_reached', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }},
                    { data: 'instructors', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }},
                    { data: 'drivers', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }},
                    { data: 'programs', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }}
                ]
            });
        }

        $('#seeReport').click(() => { loadData(); });

        $('#resetFilters').click(function() {
            window.PramanaDashboard.resetTable('#nationwideTable', loadData);
        });
        $('#exportXlsx').click(() => {
            const q = new URLSearchParams({ start_year: $('#startYear').val(), end_year: $('#endYear').val(), region: $('#regionFilter').val() }).toString();
            window.exportToXLSX(`/nationwide/export?${q}`, 'nationwide_dashboard.xlsx');
        });

        $('#toggleDataLabels').change(function() {
            if (window.sessionsTrendInst) window.sessionsTrendInst.update();
            if (window.studentsRegionInst) window.studentsRegionInst.update();
        });

        setTimeout(loadData, 300);
    });
</script>
{% endblock %}
