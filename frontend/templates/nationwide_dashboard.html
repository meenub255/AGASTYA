{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Filter Pane -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Start Year</label>
                    <select id="startYear" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>End Year</label>
                    <select id="endYear" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <hr>
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="resetFilters" class="btn btn-block btn-reset-filters mb-2">
                    <i class="fas fa-undo mr-1"></i> Reset All
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="col-md-10">
        <!-- KPI Cards -->
        <div class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiInstructors">0</h3>
                        <p>Total Instructors</p>
                    </div>
                    <div class="icon"><i class="fas fa-users"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiDrivers">0</h3>
                        <p>Total Drivers</p>
                    </div>
                    <div class="icon"><i class="fas fa-truck"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiStates">0</h3>
                        <p>States Reached</p>
                    </div>
                    <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiPrograms">0</h3>
                        <p>Total Programs</p>
                    </div>
                    <div class="icon"><i class="fas fa-project-diagram"></i></div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="card h-100 white-chart-card">
                    <div class="card-header border-0 pb-0 d-flex justify-content-between align-items-center">
                        <h3 class="card-title text-sm uppercase">Sessions by Region</h3>
                        <i class="fas fa-info-circle text-muted ml-auto region-legend-trigger" 
                           style="cursor: pointer;"
                           data-toggle="popover" 
                           data-trigger="click" 
                           data-html="true"
                           tabindex="0"
                           title="Region Code Legend" 
                           data-content="Loading..."></i>
                    </div>
                    <div class="card-body">
                        <div style="height:260px"><canvas id="sessionsRegionChart"></canvas></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100 white-chart-card">
                    <div class="card-header border-0 pb-0 d-flex justify-content-between align-items-center">
                        <h3 class="card-title text-sm uppercase">Students Reached by Region</h3>
                        <i class="fas fa-info-circle text-muted ml-auto region-legend-trigger" 
                           style="cursor: pointer;"
                           data-toggle="popover" 
                           data-trigger="click" 
                           data-html="true"
                           tabindex="0"
                           title="Region Code Legend" 
                           data-content="Loading..."></i>
                    </div>
                    <div class="card-body">
                        <div style="height:260px"><canvas id="studentsRegionChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card white-chart-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="nationwideTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Region</th>
                                <th>Sessions</th>
                                <th>Schools</th>
                                <th>Exposures</th>
                                <th>Instructors</th>
                                <th>Drivers</th>
                                <th>Programs</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(function () {
        const pagination = window.PramanaPagination;
        let regionMapping = {};
        if ($.fn.select2) $('.select2').select2({ theme: 'bootstrap4' });

        // Initialize popovers
        $('.region-legend-trigger').popover({
            html: true,
            sanitize: false,
            trigger: 'click',
            placement: 'bottom'
        });

        function getAcronym(str) {
            if (!str) return '';
            const parts = str.split('_');
            if (parts.length === 1 && str.length > 5) {
                return str.substring(0, 3).toUpperCase();
            }
            let acronym = '';
            parts.forEach(p => {
                if (p.length > 0) acronym += p[0].toUpperCase();
            });
            return acronym;
        }

        function updateLegendPopover() {
            let content = '<div class="small" style="max-height: 200px; overflow-y: auto;"><table class="table table-sm mb-0">';
            const sortedKeys = Object.keys(regionMapping).sort();
            if (sortedKeys.length === 0) {
                content = "No regions displayed";
            } else {
                sortedKeys.forEach(code => {
                    content += `<tr><td class="font-weight-bold pr-2" style="border-top:0">${code}</td><td style="border-top:0">: ${regionMapping[code]}</td></tr>`;
                });
                content += '</table></div>';
            }
            $('.region-legend-trigger').each(function() {
                $(this).attr('data-content', content);
                const popover = $(this).data('bs.popover');
                if (popover) popover.config.content = content;
            });
        }

        fetch('/nationwide/filters')
            .then(r => r.json())
            .then(data => {
                data.years.forEach(y => {
                    $('#startYear').append(new Option(y, y));
                    $('#endYear').append(new Option(y, y));
                });
                data.regions.forEach(r => $('#regionFilter').append(new Option(r, r)));
            });

        function renderBarChart(canvasId, chartData, chartRef, color) {
            const el = document.getElementById(canvasId);
            if (!el) return;
            const ctx = el.getContext('2d');
            
            // Process labels for acronyms
            const originalLabels = chartData.map(d => d.label);
            const acronymLabels = originalLabels.map(label => {
                const code = getAcronym(label);
                regionMapping[code] = label;
                return code;
            });

            if (window[chartRef]) window[chartRef].destroy();
            window[chartRef] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: acronymLabels,
                    datasets: [{ data: chartData.map(d => d.value), backgroundColor: color, borderRadius: 4 }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: function(context) {
                                    const code = context[0].label;
                                    return regionMapping[code] || code;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { display: false },
                            ticks: { color: '#000000', precision: 0 }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { 
                                color: '#000000',
                                autoSkip: false,
                                maxRotation: 0,
                                minRotation: 0
                            }
                        }
                    }
                }
            });
        }

        function loadData() {
            window.loadReportData = loadData;
            window.PramanaDashboard.initDataTable('#nationwideTable', {
                ajaxUrl: '/nationwide/data',
                getFilters: function() {
                    return {
                        start_year: $('#startYear').val(),
                        end_year: $('#endYear').val(),
                        region: $('#regionFilter').val()
                    };
                },
                onDataLoad: function(data) {
                    if (data.kpis && data.kpis.length >= 4) {
                        $('#kpiInstructors').text(data.kpis[0].value.toLocaleString());
                        $('#kpiDrivers').text(data.kpis[1].value.toLocaleString());
                        $('#kpiStates').text(data.kpis[2].value.toLocaleString());
                        $('#kpiPrograms').text(data.kpis[3].value.toLocaleString());
                    }
                    if (data.charts) {
                        regionMapping = {}; // Reset for fresh data load
                        renderBarChart('sessionsRegionChart', data.charts.sessions_by_region, 'sessionsChart', '#3b82f6');
                        renderBarChart('studentsRegionChart', data.charts.students_by_region, 'studentsChart', '#10b981');
                        updateLegendPopover();
                    }
                },
                columns: [
                    { data: 'region_name', className: 'font-weight-bold' },
                    { data: 'sessions', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }},
                    { data: 'schools_visited', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }},
                    { data: 'students_reached', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }},
                    { data: 'instructors', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }},
                    { data: 'drivers', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }},
                    { data: 'programs', className: 'text-center', render: function(data) {
                        return (data || 0).toLocaleString();
                    }}
                ]
            });
        }

        $('#seeReport').click(() => { loadData(); });

        $('#resetFilters').click(function() {
            window.PramanaDashboard.resetTable('#nationwideTable', loadData);
        });
        $('#exportXlsx').click(() => {
            const q = new URLSearchParams({ start_year: $('#startYear').val(), end_year: $('#endYear').val(), region: $('#regionFilter').val() }).toString();
            window.exportToXLSX(`/nationwide/export?${q}`, 'nationwide_dashboard.xlsx');
        });

        setTimeout(loadData, 300);
    });
</script>
{% endblock %}
