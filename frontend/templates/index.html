{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card filter-card shadow-lg">
            <div class="card-header">
                <h3 class="card-title text-bold"><i class="fas fa-filter mr-2"></i>Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group mb-4">
                    <label class="filter-label">Year</label>
                    <select id="yearFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="year" data-placeholder="Select Year">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Region</label>
                    <select id="regionFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="region" data-placeholder="Select Region">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Program</label>
                    <select id="programFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="program" data-placeholder="Select Program">
                    </select>
                </div>
                
                <div class="mt-5">
                    <button id="seeReport" class="btn btn-primary btn-block btn-premium mb-3">
                        <i class="fas fa-sync-alt mr-2"></i>See Report
                    </button>
                    <button id="resetFilters" class="btn btn-outline-light btn-block btn-premium mb-3" style="border-color: rgba(255,255,255,0.2)">
                        <i class="fas fa-undo mr-2"></i>Reset All
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- KPI Grid -->
        {% include "partials/overview_kpis.html" %}

        <section class="overview-content-stack mt-2">
            <div class="row">
                <div class="col-md-6 mb-2">
                    <div class="card h-100 white-chart-card">
                        <div class="card-header border-0 pb-0 d-flex justify-content-between align-items-center">
                            <h3 class="card-title text-sm uppercase">Number of Programs by Region</h3>
                            <i class="fas fa-info-circle text-muted ml-auto region-legend-trigger" 
                               style="cursor: pointer;"
                               data-toggle="popover" 
                               data-trigger="click" 
                               data-html="true"
                               tabindex="0"
                               title="Region Code Legend" 
                               data-content="Loading..."></i>
                        </div>
                        <div class="card-body">
                            <div style="height:380px;">
                                <canvas id="programChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 mb-2">
                    <div class="card h-100 white-chart-card">
                        <div class="card-header border-0 pb-0 d-flex justify-content-between align-items-center">
                            <h3 class="card-title text-sm uppercase">Number of Instructors per Region</h3>
                            <i class="fas fa-info-circle text-muted ml-auto region-legend-trigger" 
                               style="cursor: pointer;"
                               data-toggle="popover" 
                               data-trigger="click" 
                               data-html="true"
                               tabindex="0"
                               title="Region Code Legend" 
                               data-content="Loading..."></i>
                        </div>
                        <div class="card-body">
                            <div style="height:380px;">
                                <canvas id="instructorRegionChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(function () {
        const pagination = window.PramanaPagination;
        let regionMapping = {};

        // Register Global Plugins
        if (typeof Chart !== 'undefined' && typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        }

        if ($.fn.select2) {
            $('.select2').select2({ theme: 'bootstrap4' });
        }

        // Initialize popovers with sanitization disabled to allow tables
        $('.region-legend-trigger').popover({
            html: true,
            sanitize: false,
            trigger: 'click',
            placement: 'bottom'
        });

        function getAcronym(str) {
            if (!str) return '';
            const parts = str.split('_');
            if (parts.length === 1 && str.length > 5) {
                return str.substring(0, 3).toUpperCase();
            }
            let acronym = '';
            parts.forEach(p => {
                if (p.length > 0) {
                    acronym += p[0].toUpperCase();
                }
            });
            return acronym;
        }

        function updateLegendPopover() {
            let content = '<div class="small" style="max-height: 200px; overflow-y: auto;"><table class="table table-sm mb-0">';
            const sortedKeys = Object.keys(regionMapping).sort();
            if (sortedKeys.length === 0) {
                content = "No regions displayed";
            } else {
                sortedKeys.forEach(code => {
                    content += `<tr><td class="font-weight-bold pr-2" style="border-top:0">${code}</td><td style="border-top:0">: ${regionMapping[code]}</td></tr>`;
                });
                content += '</table></div>';
            }
            
            $('.region-legend-trigger').each(function() {
                // Set the attribute for persistence
                $(this).attr('data-content', content);
                
                // Update the active popover instance configuration
                const popover = $(this).data('bs.popover');
                if (popover) {
                    popover.config.content = content;
                }
            });
        }

        // Global multi-filter initialization
        if ($.fn.select2) {
            window.PramanaDashboard.initMultiFilters();
        }

        const rf = $('#regionFilter');
        const pf = $('#programFilter');
        const yf = $('#yearFilter');

        // Initial filters load
        fetch('/dashboard/filters')
            .then(res => res.json())
            .then(data => {
                data.regions.forEach(r => rf.append(new Option(r, r)));
                data.years.forEach(y => yf.append(new Option(y, y)));
            });

        // Dynamic Program Filter based on Region
        rf.on('change', function () {
            const regions = $(this).val(); // This is now an array
            pf.empty().append(new Option('All Programs', ''));
            
            if (regions && regions.length > 0) {
                const query = $.param({ region_name: regions }, true);
                fetch(`/dashboard/filters?${query}`)
                    .then(res => res.json())
                    .then(data => {
                        data.programs.forEach(p => pf.append(new Option(p, p)));
                    });
            }
        });

        function loadData() {
            const filters = window.PramanaDashboard.collectFilters();
            
            // Sync with backend naming if necessary
            if (filters.year) filters.years = filters.year; 
            
            const query = $.param(filters, true);
            fetch(`/dashboard/data?${query}`)
                .then(res => res.json())
                .then(data => {
                    // KPIs
                    $('#kpiInstructors').text(data.kpis.total_instructors.toLocaleString());
                    $('#kpiDrivers').text(data.kpis.total_drivers.toLocaleString());
                    $('#kpiStates').text(data.kpis.total_states.toLocaleString());
                    $('#kpiPrograms').text(data.kpis.total_programs.toLocaleString());

                    // Reset mapping for this data load
                    regionMapping = {};

                    // Charts
                    function renderBarChart(canvasId, chartData, chartRef) {
                        const el = document.getElementById(canvasId);
                        if (!el) return;
                        const ctx = el.getContext('2d');
                        
                        // Process labels for acronyms
                        if (chartData.labels) {
                            chartData.labels = chartData.labels.map(label => {
                                const code = getAcronym(label);
                                regionMapping[code] = label;
                                return code;
                            });
                        }

                        if (window[chartRef]) window[chartRef].destroy();

                        window[chartRef] = new Chart(ctx, {
                            type: 'bar',
                            data: chartData,
                            options: {
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: {
                                        display: true,
                                        position: 'bottom',
                                        align: 'start',
                                        labels: { color: '#000000' }
                                    },
                                    datalabels: {
                                        anchor: 'end',
                                        align: 'top',
                                        offset: 4,
                                        color: '#666666',
                                        font: {
                                            weight: 'bold',
                                            size: 11
                                        },
                                        formatter: function(value) {
                                            return value.toLocaleString();
                                        }
                                    },
                                    tooltip: {
                                        callbacks: {
                                            title: function(context) {
                                                // Tooltip still shows original name
                                                const code = context[0].label;
                                                return regionMapping[code] || code;
                                            }
                                        }
                                    }
                                },
                                scales: {
                                    y: {
                                        beginAtZero: true,
                                        grid: { display: false },
                                        ticks: {
                                            color: '#000000',
                                            precision: 0
                                        }
                                    },
                                    x: {
                                        grid: { display: false },
                                        ticks: { 
                                            color: '#000000',
                                            autoSkip: false,
                                            maxRotation: 0, // No rotation needed if labels are small
                                            minRotation: 0
                                        }
                                    }
                                }
                            }
                        });
                    }

                    function renderTreemap(canvasId, chartData, chartRef) {
                        const el = document.getElementById(canvasId);
                        if (!el) return;
                        const ctx = el.getContext('2d');

                        if (window[chartRef]) window[chartRef].destroy();

                        // Transform labels and data into treemap format: [{v: value, g: group}]
                        const treeData = chartData.labels.map((label, i) => {
                            const code = getAcronym(label);
                            regionMapping[code] = label;
                            return {
                                v: chartData.datasets[0].data[i],
                                g: code
                            };
                        });

                        const values = treeData.map(d => d.v);
                        const maxVal = Math.max(...values) || 1;
                        const minVal = Math.min(...values) || 0;
                        const range = maxVal - minVal || 1;

                        window[chartRef] = new Chart(ctx, {
                            type: 'treemap',
                            data: {
                                datasets: [{
                                    label: 'Instructors',
                                    tree: treeData,
                                    key: 'v',
                                    groups: ['g'],
                                    backgroundColor: (ctx) => {
                                        const value = ctx.raw && ctx.raw.v;
                                        if (!value) return '#f8fafc';
                                        // Normalize ratio based on the actual range of the data
                                        const normRatio = (value - minVal) / range;
                                        // Lightness: 90% (very light) -> 30% (very dark)
                                        const l = 90 - (normRatio * 60);
                                        return `hsl(217, 91%, ${l}%)`;
                                    },
                                    borderColor: '#1e3a8a',
                                    borderWidth: 1,
                                    spacing: 1,
                                    labels: {
                                        display: true,
                                        formatter: (ctx) => [ctx.raw.g, ctx.raw.v.toLocaleString()],
                                        color: (ctx) => {
                                            const value = ctx.raw && ctx.raw.v;
                                            const normRatio = (value - minVal) / range;
                                            return normRatio > 0.35 ? '#fff' : '#1e3a8a'; // Dynamic text color for readability
                                        },
                                        font: { size: 11, weight: 'bold' }
                                    },
                                    captions: { display: false }
                                }]
                            },
                            options: {
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: { display: false },
                                    datalabels: { display: false }, // Disable to avoid conflict with treemap labels
                                    tooltip: {
                                        callbacks: {
                                            title: (items) => {
                                                const code = items[0].raw.g;
                                                return regionMapping[code] || code;
                                            },
                                            label: (item) => `Instructors: ${item.raw.v.toLocaleString()}`
                                        }
                                    }
                                }
                            }
                        });
                    }

                    renderTreemap('instructorRegionChart', data.charts.instructors_by_region, 'instructorChartInst');
                    renderBarChart('programChart', data.charts.programs_by_region, 'programChartInst');
                    
                    // Update Legend Popover with all discovered mappings
                    updateLegendPopover();
                });
        }

        $('#seeReport').click(function () {
            loadData();
        });

        // Auto-load
        setTimeout(loadData, 300);
    });
</script>
{% endblock %}
