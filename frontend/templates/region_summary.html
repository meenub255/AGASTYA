{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">Select Region</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Program Type</label>
                    <select id="programTypeFilter" class="form-control select2" disabled>
                        <option value="">Select Program</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">Select Year</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">Select Month</option>
                    </select>
                </div>
                <hr>
                <button id="seeReportBtn" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="resetFilters" class="btn btn-block btn-reset-filters mb-2">
                    <i class="fas fa-undo mr-1"></i> Reset All
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- Dynamic KPI Cards (4 Cards) -->
        <div class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiTotalSessions">0</h3>
                        <p>Total Sessions</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-clock"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiSchoolsExposure">0</h3>
                        <p>Total Schools Exposure</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiScienceFairs">0</h3>
                        <p>Total Science Fair (SF)</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-flask"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiTeacherTraining">0</h3>
                        <p>Total Teacher Training Program (TTP)</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                </div>
            </div>
        </div>

        <div id="reportContent">
            <div class="row">
                <div class="col-lg-12">
                    <div class="card card-outline card-info">
                        <div class="card-body table-responsive p-0">
                            <table class="table table-striped table-valign-middle high-contrast-table" id="regionTable">
                                <thead>
                                    <tr>
                                        <th>Region</th>
                                        <th>Sessions</th>
                                        <th>Students</th>
                                        <th>Teachers</th>
                                        <th>Schools</th>
                                    </tr>
                                </thead>
                                <tbody id="summaryTableBody">
                                    <!-- Rows will be injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(function () {
        const pagination = window.PramanaPagination;

        if ($.fn.select2) {
            $('.select2').select2({ theme: 'bootstrap4' });
        }

        // Load initial filter options (Regions, Years, Months)
        function loadFilters(regionName = null) {
            const url = regionName ? `/region-summary/filters?region=${encodeURIComponent(regionName)}` : '/region-summary/filters';
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (!regionName) {
                        // Initial load of static filters
                        const r = $('#regionFilter');
                        data.regions.forEach(reg => r.append(new Option(reg, reg)));
                        
                        const y = $('#yearFilter');
                        data.years.forEach(yr => y.append(new Option(yr, yr)));
                        
                        const m = $('#monthFilter');
                        data.months.forEach(mo => m.append(new Option(mo.name, mo.id)));
                    }

                    // Update Program Type dropdown dependent on Region
                    const pt = $('#programTypeFilter');
                    pt.empty().append(new Option('Select Program', ''));
                    
                    if (data.programs && data.programs.length > 0) {
                        data.programs.forEach(p => pt.append(new Option(p, p)));
                        pt.prop('disabled', false);
                    } else {
                        pt.prop('disabled', true);
                    }
                });
        }

        loadFilters();

        // Dependent filter logic: Region -> Program
        $('#regionFilter').on('change', function() {
            const region = $(this).val();
            loadFilters(region);
        });

        function loadData() {
            window.PramanaDashboard.initDataTable('#regionTable', {
                ajaxUrl: '/region-summary/data',
                getFilters: function() {
                    return {
                        region: $('#regionFilter').val(),
                        program_type: $('#programTypeFilter').val(),
                        year: $('#yearFilter').val(),
                        month: $('#monthFilter').val()
                    };
                },
                onDataLoad: function(data) {
                    // Update KPIs (4 cards)
                    if (data.kpis) {
                        $('#kpiTotalSessions').text(data.kpis[0].value.toLocaleString());
                        $('#kpiSchoolsExposure').text(data.kpis[1].value.toLocaleString());
                        $('#kpiScienceFairs').text(data.kpis[2].value.toLocaleString());
                        $('#kpiTeacherTraining').text(data.kpis[3].value.toLocaleString());
                    }
                },
                columns: [
                    { data: 'region' },
                    { data: 'sessions', render: function(data) {
                        return data.toLocaleString();
                    }},
                    { data: 'students_reached', render: function(data) {
                        return data.toLocaleString();
                    }},
                    { data: 'teachers_trained', render: function(data) {
                        return data.toLocaleString();
                    }},
                    { data: 'schools_covered', render: function(data) {
                        return data.toLocaleString();
                    }}
                ]
            });
        }


        $('#seeReportBtn').on('click', function () {
            loadData();
        });

        $('#resetFilters').click(function() {
            window.PramanaDashboard.resetTable('#regionTable', loadData);
        });

        $('#exportXlsx').click(function () {
            const filters = {
                program_type: $('#programTypeFilter').val(),
                year: $('#yearFilter').val(),
                month: $('#monthFilter').val()
            };
            const query = new URLSearchParams(filters).toString();
            window.exportToXLSX(`/region-summary/export?${query}`, 'region_summary.xlsx');
        });

        // Auto-load
        setTimeout(loadData, 300);
    });
</script>
{% endblock %}
