{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card filter-card shadow-lg">
            <div class="card-header">
                <h3 class="card-title text-bold"><i class="fas fa-filter mr-2"></i>Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group mb-4">
                    <label class="filter-label">Region</label>
                    <select id="regionFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="region" data-placeholder="Select Region">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Program Type</label>
                    <select id="programTypeFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="program_type" data-placeholder="Select Program">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Year</label>
                    <select id="yearFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="year" data-placeholder="Select Year">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Month</label>
                    <select id="monthFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="month" data-placeholder="Select Month">
                    </select>
                </div>
                
                <div class="mt-5">
                    <button id="seeReportBtn" class="btn btn-primary btn-block btn-premium mb-3">
                        <i class="fas fa-sync-alt mr-2"></i>See Report
                    </button>
                    <button id="resetFilters" class="btn btn-outline-light btn-block btn-premium mb-3" style="border-color: rgba(255,255,255,0.2)">
                        <i class="fas fa-undo mr-2"></i>Reset All
                    </button>
                    <button id="exportXlsx" class="btn btn-success btn-block btn-premium">
                        <i class="fas fa-file-excel mr-2"></i>Export XLSX
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- Dynamic KPI Cards (4 Cards) -->
        <div class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiTotalSessions">0</h3>
                        <p>Total Sessions</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-clock"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiSchoolsExposure">0</h3>
                        <p>Total Schools Exposure</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiScienceFairs">0</h3>
                        <p>Total Science Fair (SF)</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-flask"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiTeacherTraining">0</h3>
                        <p>Total Teacher Training Program (TTP)</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                </div>
            </div>
        </div>

        <div id="reportContent">
            <div class="row">
                <div class="col-lg-12">
                    <div class="card card-outline card-info">
                        <div class="card-body table-responsive p-0">
                            <table class="table table-striped table-valign-middle high-contrast-table" id="regionTable">
                                <thead>
                                    <tr>
                                        <th>Region</th>
                                        <th>Sessions</th>
                                        <th>Students</th>
                                        <th>Teachers</th>
                                        <th>Schools</th>
                                    </tr>
                                </thead>
                                <tbody id="summaryTableBody">
                                    <!-- Rows will be injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(function () {
        const pagination = window.PramanaPagination;

        if ($.fn.select2) {
            $('.select2:not(.filter-multi)').select2({ theme: 'bootstrap4' });
            window.PramanaDashboard.initMultiFilters();
        }

        // Load initial filter options (Regions, Years, Months)
        function loadFilters() {
            const filters = window.PramanaDashboard.collectFilters();
            const query = $.param(filters, true);
            fetch(`/region-summary/filters?${query}`)
                .then(response => response.json())
                .then(data => {
                    // Update Regions if empty
                    const r = $('#regionFilter');
                    if (r.children().length === 0) {
                        data.regions.forEach(reg => r.append(new Option(reg, reg)));
                    }
                    
                    // Update Years if empty
                    const y = $('#yearFilter');
                    if (y.children().length === 0) {
                        data.years.forEach(yr => y.append(new Option(yr, yr)));
                    }
                    
                    // Update Months if empty
                    const m = $('#monthFilter');
                    if (m.children().length === 0) {
                        data.months.forEach(mo => m.append(new Option(mo.name, mo.id)));
                    }

                    // Update Program Type dropdown dependent on Region
                    const pt = $('#programTypeFilter');
                    const selectedPrograms = pt.val() || [];
                    pt.empty();
                    
                    if (data.programs && data.programs.length > 0) {
                        data.programs.forEach(p => pt.append(new Option(p, p)));
                        pt.val(selectedPrograms).trigger('change.select2');
                        pt.prop('disabled', false);
                    } else {
                        pt.prop('disabled', true);
                    }
                });
        }

        loadFilters();

        // Dependent filter logic: Region -> Program
        $('#regionFilter').on('change', function() {
            loadFilters();
        });

        function loadData() {
            window.PramanaDashboard.initDataTable('#regionTable', {
                ajaxUrl: '/region-summary/data',
                getFilters: function() {
                    return window.PramanaDashboard.collectFilters();
                },
                onDataLoad: function(data) {
                    // Update KPIs (4 cards)
                    if (data.kpis) {
                        $('#kpiTotalSessions').text(data.kpis[0].value.toLocaleString());
                        $('#kpiSchoolsExposure').text(data.kpis[1].value.toLocaleString());
                        $('#kpiScienceFairs').text(data.kpis[2].value.toLocaleString());
                        $('#kpiTeacherTraining').text(data.kpis[3].value.toLocaleString());
                    }
                },
                columns: [
                    { data: 'region' },
                    { data: 'sessions', render: function(data) {
                        return (data||0).toLocaleString();
                    }},
                    { data: 'students_reached', render: function(data) {
                        return (data||0).toLocaleString();
                    }},
                    { data: 'teachers_trained', render: function(data) {
                        return (data||0).toLocaleString();
                    }},
                    { data: 'schools_covered', render: function(data) {
                        return (data||0).toLocaleString();
                    }}
                ]
            });
        }

        $('#seeReportBtn').on('click', function () {
            loadData();
        });

        $('#resetFilters').click(function() {
            window.PramanaDashboard.resetTable('#regionTable', loadData);
        });

        $('#exportXlsx').click(function () {
            const filters = window.PramanaDashboard.collectFilters();
            const query = $.param(filters, true);
            window.exportToXLSX(`/region-summary/export?${query}`, 'region_summary.xlsx');
        });

        // Auto-load
        setTimeout(loadData, 300);
    });
</script>
{% endblock %}
