<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pramana | {{ page_title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
</head>
<body class="hold-transition sidebar-mini layout-fixed sidebar-collapse" data-page="{{ page_id }}">
<div class="wrapper">
    {% include "partials/navbar.html" %}
    {% include "partials/sidebar.html" %}

    <div class="content-wrapper">
        <section class="content-header p-2">
            <div class="container-fluid">
                <div class="row align-items-center">
                    <div class="col-sm-6">
                        <h1 class="m-0" style="font-size: 1.5rem; font-weight: 700;">{{ page_title }}</h1>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                {% block content %}{% endblock %}
            </div>
        </section>
    </div>

    {% include "partials/footer.html" %}
</div>

<!-- Global Custom DataTables Sort Menu -->
<div id="dtSortMenu" class="dropdown-menu shadow-sm" style="position: absolute; display: none; z-index: 1050; min-width: 150px; font-size: 0.9rem;">
    <a class="dropdown-item py-2 dt-sort-action" href="#" data-sort="asc">
        <i class="fas fa-sort-amount-down-alt mr-2 text-primary"></i> Ascending
    </a>
    <a class="dropdown-item py-2 dt-sort-action" href="#" data-sort="desc">
        <i class="fas fa-sort-amount-down mr-2 text-primary"></i> Descending
    </a>
    <div class="dropdown-divider my-0"></div>
    <a class="dropdown-item py-2 dt-sort-action" href="#" data-sort="remove">
        <i class="fas fa-times mr-2 text-danger"></i> Remove Sort
    </a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', path='js/dashboard.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
