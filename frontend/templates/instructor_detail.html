{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card filter-card shadow-lg">
            <div class="card-header">
                <h3 class="card-title text-bold"><i class="fas fa-filter mr-2"></i>Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group mb-4">
                    <label class="filter-label">Instructor</label>
                    <select id="instructorFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="instructor_name" data-placeholder="Select Instructor">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Year</label>
                    <select id="yearFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="year" data-placeholder="Select Year">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Month</label>
                    <select id="monthFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="month" data-placeholder="Select Month">
                    </select>
                </div>
                
                <div class="mt-5">
                    <button id="seeReport" class="btn btn-primary btn-block btn-premium mb-3">
                        <i class="fas fa-sync-alt mr-2"></i>See Report
                    </button>
                    <button id="resetFilters" class="btn btn-outline-light btn-block btn-premium mb-3" style="border-color: rgba(255,255,255,0.2)">
                        <i class="fas fa-undo mr-2"></i>Reset All
                    </button>
                    <button id="exportXlsx" class="btn btn-success btn-block btn-premium">
                        <i class="fas fa-file-excel mr-2"></i>Export XLSX
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- Dynamic KPI Cards (4 Cards) -->
        <div id="kpiContainer" class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiSessions">0</h3>
                        <p>Total Sessions</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-clock"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiStudents">0</h3>
                        <p>Total Students Reach</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiSchools">0</h3>
                        <p>Schools Covered</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-school"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiTeachers">0</h3>
                        <p>Teachers Trained</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card mt-2">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="detailTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Program Name</th>
                                <th>Date</th>
                                <th>Activity</th>
                                <th>School Name</th>
                                <th>Class</th>
                                <th>Topic</th>
                                <th class="text-center">Boys</th>
                                <th class="text-center">Girls</th>
                                <th class="text-center">Teachers</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;

    if ($.fn.select2) {
        $('.select2:not(.filter-multi)').select2({ theme: 'bootstrap4' });
        window.PramanaDashboard.initMultiFilters();
    }

    fetch('/instructor-detail/filters')
        .then(res => res.json())
        .then(data => {
            const instructorSelect = $('#instructorFilter');
            const yearSelect = $('#yearFilter');
            const monthSelect = $('#monthFilter');

            data.instructors.forEach(i => instructorSelect.append(new Option(i, i)));
            data.years.forEach(y => yearSelect.append(new Option(y, y)));
            data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
        });

    function loadData() {
        window.PramanaDashboard.initDataTable('#detailTable', {
            ajaxUrl: '/instructor-detail/data',
            getFilters: function() {
                return window.PramanaDashboard.collectFilters();
            },
            onDataLoad: function(data) {
                if (data.kpis && data.kpis.length >= 4) {
                    $('#kpiSessions').text((data.kpis[0].value || 0).toLocaleString());
                    $('#kpiStudents').text((data.kpis[1].value || 0).toLocaleString());
                    $('#kpiSchools').text((data.kpis[2].value || 0).toLocaleString());
                    $('#kpiTeachers').text((data.kpis[3].value || 0).toLocaleString());
                }
            },
            columns: [
                { data: 'program_name', width: '15%', render: function(data) {
                    return `<span class="badge badge-info">${data || 'N/A'}</span>`;
                }},
                { data: 'date', className: 'text-center' },
                { data: 'activity_name' },
                { data: 'school_name', className: 'font-weight-bold' },
                { data: 'class_name', className: 'text-center' },
                { data: 'topic_name' },
                { data: 'boys', className: 'text-center' },
                { data: 'girls', className: 'text-center' },
                { data: 'teachers', className: 'text-center text-primary font-weight-bold' }
            ]
        });
    }

    $('#seeReport').click(function () {
        loadData();
    });

    $('#resetFilters').click(function() {
        window.PramanaDashboard.resetTable('#detailTable', loadData);
    });

    $('#exportXlsx').click(function() {
        const filters = window.PramanaDashboard.collectFilters();
        const query = $.param(filters, true);
        window.exportToXLSX(`/instructor-detail/export?${query}`, 'instructor_detail.xlsx');
    });

    // Auto-load
    setTimeout(loadData, 300);
});
</script>
{% endblock %}
