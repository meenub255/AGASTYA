{% extends "base.html" %}

{% block title %}Work Days Report{% endblock %}

{% block content %}
<div class="content-wrapper p-3">
    <!-- Filters Sidebar Integration (Standardized Dashboard Layout) -->
    <div class="row">
        <!-- Left Column: Filter Slicers -->
        <div class="col-md-2 mb-3">
            <div class="card filter-card shadow-lg">
                <div class="card-header">
                    <h3 class="card-title text-bold"><i class="fas fa-filter mr-2"></i>Filters</h3>
                </div>
                <div class="card-body">
                    <div class="form-group mb-4">
                        <label class="filter-label">Region</label>
                        <select id="region_filter" class="form-control select2 filter-multi" multiple="multiple" data-filter="region" data-placeholder="Select Region">
                        </select>
                    </div>
                    <div class="form-group mb-4">
                        <label class="filter-label">Area</label>
                        <select id="area_filter" class="form-control select2 filter-multi" multiple="multiple" data-filter="area" data-placeholder="Select Area">
                        </select>
                    </div>
                    <div class="form-group mb-4">
                        <label class="filter-label">Year</label>
                        <select id="year_filter" class="form-control select2 filter-multi" multiple="multiple" data-filter="year" data-placeholder="Select Year">
                        </select>
                    </div>
                    <div class="form-group mb-4">
                        <label class="filter-label">Month</label>
                        <select id="month_filter" class="form-control select2 filter-multi" multiple="multiple" data-filter="month" data-placeholder="Select Month">
                        </select>
                    </div>
                    
                    <div class="mt-5">
                        <button id="apply_filters" class="btn btn-primary btn-block btn-premium mb-3">
                            <i class="fas fa-sync-alt mr-2"></i>Update Data
                        </button>
                        <button id="reset_filters" class="btn btn-outline-light btn-block btn-premium mb-3" style="border-color: rgba(255,255,255,0.2)">
                            <i class="fas fa-undo mr-2"></i>Reset All
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Data Visualization Area -->
        <div class="col-md-10">
            <!-- KPI Cards -->
            <div id="kpi_container" class="row">
                <!-- KPIs will be injected here -->
                <div class="col-lg-3 col-6">
                    <div class="small-box bg-info">
                        <div class="inner">
                            <h3 id="total_instructors">0</h3>
                            <p>Total Instructors</p>
                        </div>
                        <div class="icon">
                            <i class="fas fa-users"></i>
                        </div>
                    </div>
                </div>
                <!-- ... other KPI placeholders ... -->
            </div>

            <!-- Granular Data Table -->
            <div class="card card-outline card-navy">
                <div class="card-header border-0">
                    <h3 class="card-title font-weight-bold">
                        <i class="fas fa-table mr-1"></i> Instructor Working Days Detail
                    </h3>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped table-valign-middle mb-0" id="work_days_table">
                            <thead class="bg-light">
                                <tr>
                                    <th>Instructor Name</th>
                                    <th>Region / Area</th>
                                    <th class="text-center">Total Working Days</th>
                                    <th>Dates Active (DD)</th>
                                </tr>
                            </thead>
                            <tbody id="table_body">
                                <!-- Data will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>



<script nonce="{{ request.state.nonce if request.state.nonce else '' }}">
document.addEventListener('DOMContentLoaded', function() {
    let currentPage = 1;
    const itemsPerPage = 15;

    // Premium Multi-filter initialization
    if ($.fn.select2) {
        window.PramanaDashboard.initMultiFilters();
    }

    // Load Filters
    function loadFilters(regionIds = null) {
        const query = regionIds ? `?region_id=${regionIds.join(',')}` : '';
        fetch(`/api/work-days/filters${query}`)
            .then(res => res.json())
            .then(data => {
                if (!regionIds) {
                    populateDropdown('#region_filter', data.regions);
                    populateDropdown('#year_filter', data.years.map(y => ({id: y, name: y})));
                    
                    // Default to 2026 if available and nothing is selected
                    if (!$('#year_filter').val()?.length && data.years.includes(2026)) {
                        $('#year_filter').val([2026]).trigger('change.select2');
                    }
                    
                    populateDropdown('#month_filter', data.months);
                }
                populateDropdown('#area_filter', data.areas);
            });
    }

    function populateDropdown(selector, data) {
        const select = $(selector);
        data.forEach(item => {
            select.append(`<option value="${item.id}">${item.name}</option>`);
        });
    }

    // Load Data
    function loadData(page = 1) {
        const filters = window.PramanaDashboard.collectFilters();
        const queryParams = $.param(filters, true);
        
        fetch(`/api/work-days/data?${queryParams}`)
            .then(res => res.json())
            .then(data => {
                renderKPIs(data.kpis);
                renderTable(data.table_data);
            })
            .catch(err => console.error("Error fetching data:", err));
    }

    function renderKPIs(kpis) {
        const container = $('#kpi_container');
        container.empty();
        kpis.forEach(kpi => {
            container.append(`
                <div class="col-lg-3 col-6">
                    <div class="small-box ${kpi.color}">
                        <div class="inner">
                            <h3>${kpi.value}</h3>
                            <p>${kpi.label}</p>
                        </div>
                        <div class="icon">
                            <i class="${kpi.icon}"></i>
                        </div>
                    </div>
                </div>
            `);
        });
    }

    function renderTable(data) {
        const body = $('#table_body');
        body.empty();
        if (data.length === 0) {
            body.append('<tr><td colspan="4" class="text-center py-4 text-muted">No records found for selected period</td></tr>');
            return;
        }
        data.forEach(row => {
            body.append(`
                <tr>
                    <td><div class="d-flex align-items-center"><i class="fas fa-user-circle text-navy-blue mr-2"></i> ${row.instructor_name}</div></td>
                    <td><small class="text-muted"><i class="fas fa-map-marker-alt mr-1"></i> ${row.region_area}</small></td>
                    <td class="text-center"><span class="badge bg-olive py-2 px-3 font-weight-bold" style="font-size: 1rem;">${row.total_days}</span></td>
                    <td><div class="text-primary font-weight-bold" style="word-break: break-all;">${row.dates_active}</div></td>
                </tr>
            `);
        });

        // Initialize DataTable
        window.PramanaDashboard.initDataTable('#work_days_table');
    }

    // Pagination removed in favor of DataTables

    // Events
    $('.select2').select2({ theme: 'bootstrap4', width: '100%' });
    
    $('#region_filter').on('change', function() {
        loadFilters($(this).val());
    });

    $('#apply_filters').on('click', () => { loadData(1); });
    $('#reset_filters').on('click', () => {
        window.PramanaDashboard.resetTable('#work_days_table', loadData);
    });

    $('#pagination_links').on('click', 'a', function(e) { e.preventDefault(); });

    // Initial Load
    loadFilters();
    loadData();
});
</script>
{% endblock %}
