{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card filter-card shadow-lg">
            <div class="card-header">
                <h3 class="card-title text-bold"><i class="fas fa-filter mr-2"></i>Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group mb-4">
                    <label class="filter-label">Region</label>
                    <select id="regionFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="region" data-placeholder="Select Region">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Area</label>
                    <select id="areaFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="area" data-placeholder="Select Area">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Year</label>
                    <select id="yearFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="year" data-placeholder="Select Year">
                    </select>
                </div>
                <div class="form-group mb-4">
                    <label class="filter-label">Month</label>
                    <select id="monthFilter" class="form-control select2 filter-multi" multiple="multiple" data-filter="month" data-placeholder="Select Month">
                    </select>
                </div>
                
                <div class="mt-5">
                    <button id="seeReport" class="btn btn-primary btn-block btn-premium mb-3">
                        <i class="fas fa-sync-alt mr-2"></i>See Report
                    </button>
                    <button id="resetFilters" class="btn btn-outline-light btn-block btn-premium mb-3" style="border-color: rgba(255,255,255,0.2)">
                        <i class="fas fa-undo mr-2"></i>Reset All
                    </button>
                    <button id="exportXlsx" class="btn btn-success btn-block btn-premium mb-3">
                        <i class="fas fa-file-excel mr-2"></i>Export XLSX
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- KPI Cards -->
        <div id="kpiContainer" class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiTotalLeads">0</h3>
                        <p>Total Area Leads</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-user-tie"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiTotalInstructors">0</h3>
                        <p>Total Instructors</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiTotalSessions">0</h3>
                        <p>Total Sessions</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-layer-group"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiTotalStudents">0</h3>
                        <p>Total Students Impacted</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card mt-2">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="areaTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Area</th>
                                <th>Region</th>
                                <th class="text-center">Total Instructors</th>
                                <th class="text-center">Total Sessions</th>
                                <th class="text-center">Total Students</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;

    // Premium Multi-filter initialization
    if ($.fn.select2) {
        window.PramanaDashboard.initMultiFilters();
    }

    fetch('/arealead-summary/filters')
        .then(res => res.json())
        .then(data => {
            const regionSelect = $('#regionFilter');
            const areaSelect = $('#areaFilter');
            const yearSelect = $('#yearFilter');
            const monthSelect = $('#monthFilter');

            data.regions.forEach(r => regionSelect.append(new Option(r, r)));
            data.areas.forEach(a => areaSelect.append(new Option(a, a)));
            data.years.forEach(y => yearSelect.append(new Option(y, y)));
            data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
        });

    function loadData() {
        window.loadReportData = loadData;
        window.PramanaDashboard.initDataTable('#areaTable', {
            ajaxUrl: '/arealead-summary/data',
            getFilters: function() {
                return window.PramanaDashboard.collectFilters();
            },
            onDataLoad: function(data) {
                if (data.kpis && data.kpis.length >= 4) {
                    $('#kpiTotalLeads').text(data.kpis[0].value.toLocaleString());
                    $('#kpiTotalInstructors').text(data.kpis[1].value.toLocaleString());
                    $('#kpiTotalSessions').text(data.kpis[2].value.toLocaleString());
                    $('#kpiTotalStudents').text(data.kpis[3].value.toLocaleString());
                }
            },
            columns: [
                { data: 'area', className: 'font-weight-bold text-navy' },
                { data: 'region', render: function(data) {
                    return `<small class="text-muted"><i class="fas fa-globe mr-1"></i> ${data}</small>`;
                }},
                { data: 'total_instructors', className: 'text-center', render: function(data) {
                    return `<span class="badge badge-info px-2 py-1">${data}</span>`;
                }},
                { data: 'total_sessions', className: 'text-center font-weight-bold', render: function(data) {
                    return (data||0).toLocaleString();
                }},
                { data: 'total_students', className: 'text-center text-success font-weight-bold', render: function(data) {
                    return (data||0).toLocaleString();
                }}
            ]
        });
    }

    $('#seeReport').click(function () {
        loadData();
    });

    $('#resetFilters').click(function() {
        window.PramanaDashboard.resetTable('#areaTable', loadData);
    });

    $('#exportXlsx').click(function() {
        const filters = window.PramanaDashboard.collectFilters();
        const query = $.param(filters, true);
        window.exportToXLSX(`/arealead-summary/export?${query}`, 'arealead_summary.xlsx');
    });

    // Auto-load
    setTimeout(loadData, 300);
});
</script>
{% endblock %}
